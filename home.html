<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Any Dream</title>
  <link rel="stylesheet" href="home.css">
  <!-- مكتبة الأيقونات الاحترافية -->
  <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

<div class="withdraw-page-container">
  <!-- بطاقة الرصيد البيضاء الاحترافية -->
  <div class="balance-card">
    <span class="balance-label">إجمالي الرصيد المقدر</span>
    <h2 class="balance-amount">0.00 <span class="currency">USDT</span></h2>
  </div>

  <!-- نموذج طلب السحب -->
  <form id="withdrawForm" class="withdraw-form" onsubmit="event.preventDefault();">
    
    <!-- حقل اختيار الشبكة -->
    <div class="form-group">
      <label class="group-label">الشبكة</label>
      <select class="styled-input" id="networkSelect" required>
        <option value="TRC20">TRC20</option>
      </select>
    </div>

    <!-- حقل عنوان المحفظة -->
    <div class="form-group">
      <label class="group-label">عنوان المحفظة</label>
      <input type="text" class="styled-input" id="walletAddress" placeholder="أدخل عنوان محفظة TRC20" required>
    </div>

    <!-- حقل كلمة المرور -->
    <div class="form-group">
      <label class="group-label">كلمة مرور الصندوق</label>
      <input type="password" class="styled-input" id="fundPassword" placeholder="أدخل كلمة مرور السحب" required>
    </div>

    <!-- رسالة الخطأ المخفية بحركة احترافية -->
    <div id="errorMessage" class="error-toast-message">
      <i class="fas fa-exclamation-circle"></i> عذراً، رصيدك الحالي غير كافٍ لإتمام عملية السحب.
    </div>

    <!-- زر السحب الأخضر -->
    <button type="button" onclick="handleWithdraw()" class="withdraw-submit-btn">سحب الأموال</button>
  </form>
</div>
  <!-- شريط الانتقالات السفلي -->
<div class="bottom-nav">
  <a href="account.html" class="nav-item">
    <i class="fas fa-user"></i>
    <span>حسابي</span>
  </a>
  <a href="tasks.html" class="nav-item">
    <i class="fas fa-tasks"></i>
    <span>المهام</span>
  </a>
  <a href="assets.html" class="nav-item">
    <i class="fas fa-wallet"></i>
    <span>الأصول</span>
  </a>
  <a href="home.html" class="nav-item active">
    <i class="fas fa-home"></i>
    <span>الرئيسية</span>
  </a>
</div>
  

<!-- كود التشغيل والتحقق البرمجي للزر والرسالة -->
<script>
function handleWithdraw() {
  const address = document.getElementById('walletAddress').value.trim();
  const password = document.getElementById('fundPassword').value.trim();
  const errorDiv = document.getElementById('errorMessage');

  // التحقق من ملء البيانات
  if (address === "" || password === "") {
      alert("يرجى ملء جميع الحقول المطلوبة أولاً.");
      return;
  }

  // إظهار التنبيه الاحترافي
  errorDiv.style.display = 'flex';
  
  // إخفاء التنبيه تلقائياً بعد 5 ثوانٍ
  setTimeout(() => {
      errorDiv.style.display = 'none';
  }, 5000);
}
</script>

</body>
</html>
