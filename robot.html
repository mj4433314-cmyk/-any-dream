<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معاينة الروبوت المطور بالكامل برمجياً</title>
  <style>
    /* خلفية داكنة للمعاينة فقط لكي تتناسب مع موقعك */
    body {
      background-color: #12161a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* الحاوية الرئيسية للروبوت */
    .robot-container {
      position: relative;
      width: 100px;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent; 
    }

    /* تصميم جسم ورأس الروبوت بالـ CSS (بدون أي صور خارحية) */
    .robot-body-css {
      width: 70px;
      height: 75px;
      background: #eef1f5; /* لون الروبوت الأبيض المطفي */
      border-radius: 40px 40px 45px 45px;
      position: relative;
      box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1), 0 4px 15px rgba(0,0,0,0.15);
    }

    /* الأذن اليسرى */
    .robot-body-css::before {
      content: '';
      position: absolute;
      top: 15px;
      left: -8px;
      width: 12px;
      height: 25px;
      background: #eef1f5;
      border-radius: 10px 0 0 10px;
      transform: rotate(-10deg);
    }

    /* الأذن اليمنى */
    .robot-body-css::after {
      content: '';
      position: absolute;
      top: 15px;
      right: -8px;
      width: 12px;
      height: 25px;
      background: #eef1f5;
      border-radius: 0 10px 10px 0;
      transform: rotate(10deg);
    }

    /* شاشة العين السوداء العريضة */
    .screen-face {
      position: absolute;
      top: 18px;
      left: 10px;
      width: 50px;
      height: 32px;
      background: #0d1117;
      border-radius: 18px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }

    /* إعدادات عيون الروبوت المضيئة وحركة الرمش التلقائية */
    .eye {
      position: absolute;
      top: 12px; 
      width: 11px;
      height: 7px;
      background: #00d2ff;
      border-radius: 50%;
      box-shadow: 0 0 6px #00d2ff, 0 0 12px #00d2ff;
      animation: blink-animation 4s infinite ease-in-out;
    }

    .left-eye { left: 9px; }  
    .right-eye { right: 9px; } 

    /* حركة رمش العين المفاجئة كل بضع ثوانٍ */
    @keyframes blink-animation {
      0%, 95%, 100% { transform: scaleY(1); }
      97% { transform: scaleY(0.1); } 
    }

    /* حاوية اللهب السماوي في الأسفل */
    .cyan-flame-container {
      position: absolute;
      bottom: 10px;
      width: 50px;
      height: 45px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      z-index: -1;
    }

    /* جزيئات اللهب السماوي المتساقطة */
    .flame {
      position: absolute;
      bottom: 45px;
      width: 6px;
      height: 6px;
      background: #00d2ff;
      border-radius: 50%;
      filter: blur(1.5px);
      box-shadow: 0 0 6px #00d2ff, 0 0 12px #00d2ff;
      opacity: 0;
    }

    /* التوقيت العشوائي لنزول الجزيئات لتبدو كتأثير متلاشي حقيقي */
    .particle-1 { left: 16px; animation: float-down 1.4s infinite linear; }
    .particle-2 { left: 22px; animation: float-down 1.8s infinite linear 0.4s; }
    .particle-3 { left: 28px; animation: float-down 1.6s infinite linear 0.2s; }

    /* حركة نزول وتلاشي النيران للأسفل */
    @keyframes float-down {
      0% {
        transform: translateY(0) scale(1.2);
        opacity: 1;
      }
      100% {
        transform: translateY(35px) scale(0.2); 
        opacity: 0; 
      }
    }
  </style>
</head>
<body>

  <!-- عنصر الروبوت البرمجي بالكامل بدون صور وبخلفية شفافة -->
  <div class="robot-container">
    <div class="robot-body-css">
      <div class="screen-face">
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
      </div>
    </div>
    <div class="cyan-flame-container">
      <div class="flame particle-1"></div>
      <div class="flame particle-2"></div>
      <div class="flame particle-3"></div>
    </div>
  </div>

</body>
</html>
