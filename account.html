<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR</title>
  <link rel="stylesheet" href="https://cloudflare.com">
  <style>
    /* دمج خط القاهرة بأعلى درجات السُمك (900) ليعطي المظهر التقني السميك الموضح بالصورة */
    @import url('https://googleapis.com');

    body { 
      background-color: #0b0e14; 
      color: #ffffff; 
      font-family: 'Cairo', sans-serif; 
      margin: 0; 
      padding: 40px 15px 160px 15px; 
      font-weight: 700;
    }
    
    .ovr { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .box { background: #181a20; border: 1px solid #2b2f36; border-radius: 16px; padding: 22px; width: 100%; max-width: 360px; text-align: center; box-sizing: border-box; }
    .wlt { background: #0b0e14; border: 1px dashed #007bff; padding: 14px; border-radius: 8px; font-size: 13px; word-break: break-all; font-family: monospace; margin: 15px 0; color: #00bfff; }
    .cls-btn { background: #2b2f36; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 900; font-family: 'Cairo', sans-serif; }

    /* مربع الروبوت التفاعلي */
    .robot-wrapper { 
      background-color: #181a20; 
      border: 1px solid #2b2f36; 
      border-radius: 16px; 
      padding: 35px 15px 30px 15px; 
      text-align: center; 
      margin: 10px 0 10px 0; 
      position: relative; 
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .robot-wrapper:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 191, 255, 0.1);
      border-color: #007bff;
    }
    .robot-canvas { position: relative; width: 100px; height: 120px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; animation: robotFloat 3s ease-in-out infinite; }
    .robot-head { position: relative; width: 80px; height: 70px; background-color: #ffffff; border-radius: 35px 35px 30px 30px; }
    .robot-ear-l, .robot-ear-r { position: absolute; width: 15px; height: 25px; background-color: #ffffff; top: 20px; border-radius: 50%; }
    .robot-ear-l { left: -7px; transform: rotate(-10deg); }
    .robot-ear-r { right: -7px; transform: rotate(10deg); }
    
    .robot-face { position: absolute; width: 60px; height: 35px; background-color: #0b0e14; border-radius: 18px; top: 18px; left: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
    .robot-eye { width: 12px; height: 12px; background-color: #00bfff; border-radius: 50%; box-shadow: 0 0 10px #00bfff, 0 0 20px #00bfff; animation: robotBlink 4s infinite; }
    
    .robot-glow-tail { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-top: 5px; }
    .glow-dot { background-color: #00bfff; border-radius: 50%; box-shadow: 0 0 8px #00bfff; animation: particleFade 1.5s infinite ease-in-out; }
    .dot1 { width: 8px; height: 8px; animation-delay: 0s; }
    .dot2 { width: 5px; height: 5px; animation-delay: 0.3s; }
    .dot3 { width: 3px; height: 3px; animation-delay: 0.6s; }

    /* تطبيق الخط الفخم والسميك العريض داخل مربع البوت */
    .robot-btn-text {
      margin-top: 20px;
      font-size: 19px;
      font-weight: 900;
      color: #00bfff;
      letter-spacing: 0.5px;
    }

    /* الخط الفاصل المضيء */
    .glow-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #2b2f36, #007bff, #2b2f36, transparent);
      box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
      margin: 25px 10px;
      border: none;
    }

    @keyframes robotFloat { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
    @keyframes robotBlink { 0%, 45%, 55%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
    @keyframes particleFade { 0% { opacity: 0.3; transform: scale(0.8) translateY(0px); } 50% { opacity: 1; transform: scale(1.2) translateY(3px); } 100% { opacity: 0.1; transform: scale(0.6) translateY(6px); } }

    /* كارت القسم السفلي */
    .action-section { background-color: #181a20; border: 1px solid #2b2f36; border-radius: 16px; padding: 22px; text-align: center; }
    
    /* عنوان الخدمات بالخط العريض */
    .action-title { font-size: 15px; color: #848e9c; margin: 0 0 18px 0; font-weight: 900; }
    
    /* الزر الأزرق المتطابق تماماً مع خط شحن الحساب السميك والمحترف */
    .btn-style { 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      gap: 10px; 
      padding: 15px 24px; 
      border-radius: 10px; 
      text-decoration: none; 
      font-weight: 900; 
      font-size: 18px; 
      width: 95%; 
      box-sizing: border-box; 
      transition: all 0.3s ease; 
      font-family: 'Cairo', sans-serif; 
      cursor: pointer; 
      background-color: #007bff; 
      color: #ffffff; 
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
    }
    .btn-style:hover { background-color: #0056b3; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0, 123, 255, 0.3); }

    /* شات تيليجرام */
    .tg-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0e1621; z-index: 2500; flex-direction: column; }
    .tg-header { background: #17212b; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #101921; }
    .tg-back { font-size: 20px; color: #6c7883; cursor: pointer; }
    .tg-avatar { width: 40px; height: 40px; background: #2f6ea5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; font-size: 16px; }
    .tg-user-info { display: flex; flex-direction: column; text-align: right; justify-content: center; }
    .tg-name { font-size: 17px; font-weight: 900; color: #fff; font-family: 'Cairo', sans-serif; }
    
    .tg-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: url('https://githubusercontent.com'); background-color: #0e1621; opacity: 0.95; }
    .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.5; position: relative; word-break: break-word; text-align: right; font-family: 'Cairo', sans-serif; font-weight: 700; }
    .msg-in { background: #182533; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg-out { background: #2b5278; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-img { max-width: 100%; border-radius: 8px; margin-bottom: 5px; display: block; }
    
    .tg-footer { background: #17212b; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #101921; }
    .tg-input-wrapper { flex: 1; background: #24303f; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; }
    .tg-input { flex: 1; background: none; border: none; color: white; font-family: 'Cairo', sans-serif; font-size: 14px; outline: none; font-weight: 700; }
    .tg-file-label { color: #6c7883; font-size: 18px; cursor: pointer; transition: color 0.2s; }
    .tg-file-label:hover { color: #5288c1; }
    #imageInput { display: none; }
    .tg-send-btn { background: none; border: none; color: #5288c1; font-size: 20px; cursor: pointer; transition: transform 0.2s; }
    .tg-send-btn:hover { transform: scale(1.1); color: #2f6ea5; }

    .wlt-copy-box { background: #0b0e14; border: 1px dashed #007bff; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 12px; color: #00bfff; word-break: break-all; margin-top: 5px; text-align: center; }

    /* شريط التنقل السفلي */
    .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #181a20; display: flex; padding: 12px 0; border-top: 1px solid #2b2f36; z-index: 1000; box-sizing: border-box; }
    .nav a { text-decoration: none; color: #848e9c; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 25%; position: relative; height: 35px; }
    .nav a i { font-size: 22px; }
    .nav a.active { color: #007bff; }
    .nav a.active::after { content: ''; position: absolute; bottom: -6px; left: 35%; width: 30%; height: 3px; background-color: #007bff; border-radius: 2px; }
  </style>
</head>
<body>

  <!-- حاوية الروبوت المطور المتحرك مدمج بها نص التـــواصل الدعــم الفـــني بالخط السميك الجديد المماثل للصورة -->
  <div class="robot-wrapper" onclick="openSup()">
    <div class="robot-canvas">
      <div class="robot-ear-l"></div>
      <div class="robot-ear-r"></div>
      <div class="robot-head">
        <div class="robot-face">
          <div class="robot-eye"></div>
          <div class="robot-eye"></div>
        </div>
      </div>
      <div class="robot-glow-tail">
        <div class="glow-dot dot1"></div>
        <div class="glow-dot dot2"></div>
        <div class="glow-dot dot3"></div>
      </div>
    </div>
    <div class="robot-btn-text">التـــواصل الدعــم الفـــني</div>
  </div>

  <!-- الخط الفاصل المضيء والاحترافي المدمج -->
  <hr class="glow-divider">

  <!-- قسم خدمات المنصة السفلية المطور بالزر الأزرق والخط الأبيض الفخم العريض المكتوب بأعلى درجات السُمك -->
  <div class="action-section">
    <p class="action-title">الوصول السريع لخدمات المنصة</p>
    <a href="https://appsgeyser.io" class="btn-style" target="_blank">
      <i class="fas fa-download"></i> تحميل التطبيق الرسمي
    </a>
  </div>

  <!-- واجهة شات تيليجرام التفاعلية المحدثة بكامل ميزات الخط العريض -->
  <div class="tg-overlay" id="supModal">
    <div class="tg-header">
      <div class="tg-back" onclick="closeSup()"><i class="fas fa-arrow-right"></i></div>
      <div class="tg-avatar">HR</div>
      <div class="tg-user-info">
        <span class="tg-name">HR</span>
      </div>
    </div>
    
    <div class="tg-body" id="chatBody">
      <div class="msg-bubble msg-in">
        مرحباً بك عزيزي المستخدم في مركز المساعدة الفورية لمنصة HR. كيف يمكننا دعمك اليوم؟
      </div>
    </div>
    
    <div class="tg-footer">
      <div class="tg-input-wrapper">
        <label for="imageInput" class="tg-file-label"><i class="fas fa-paperclip"></i></label>
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect()">
        <input type="text" class="tg-input" id="userInp" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
      </div>
      <button class="tg-send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
    <script>
    function openSup() { document.getElementById('supModal').style.display = 'flex'; }
    function closeSup() { document.getElementById('supModal').style.display = 'none'; }

    let selectedImgBase64 = "";

    function handleImageSelect() {
      const file = document.getElementById('imageInput').files;
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          selectedImgBase64 = e.target.result;
          alert("تم إرفاق الصورة بنجاح! اضغط على زر الإرسال لرفعها.");
        }
        reader.readAsDataURL(file);
      }
    }

    function handleKeyPress(e) { if(e.key === 'Enter') { sendMsg(); } }

    function sendMsg() {
      const text = document.getElementById('userInp').value.trim();
      const chatBody = document.getElementById('chatBody');

      if (text === "" && selectedImgBase64 === "") { return; }

      let userBubble = `<div class="msg-bubble msg-out">`;
      if (selectedImgBase64 !== "") { userBubble += `<img src="${selectedImgBase64}" class="msg-img">`; }
      if (text !== "") { userBubble += text; }
      userBubble += `</div>`;
      
      chatBody.innerHTML += userBubble;

      document.getElementById('userInp').value = '';
      selectedImgBase64 = "";
      document.getElementById('imageInput').value = '';
      chatBody.scrollTop = chatBody.scrollHeight;

      // تأثير طباعة الرد التلقائي الاحترافي حرفاً بحرف
      setTimeout(() => {
        let fullText = "";
        const lowerText = text.toLowerCase();

        if (lowerText === "مرحبا" || lowerText === "مرحباً" || lowerText === "سلام") {
          fullText = "مرحباً بك يرجى تحديد المشكلة التي تواجهك لنتمكن من حلها فوراً.";
        } 
        else if (lowerText.includes("شحن") || lowerText.includes("الشحن") || lowerText.includes("إيداع") || lowerText.includes("ايداع") || lowerText.includes("اشحن") || lowerText.includes("شلون")) {
          fullText = `💳 <b>معلومات شحن الحساب المباشرة:</b><br><br>الشبكة المعتمدة: <b>TRC20</b><br>عنوان محفظة الإيداع الحالية الخاص بك:<br><div class="wlt-copy-box">THJN4XBKxbZNYsw7YAHmNiZSupn3kVEDFP</div>`;
        }
        else if (lowerText.includes("باقات") || lowerText.includes("باقة") || lowerText.includes("الاشتراك") || lowerText.includes("اشتراك")) {
          fullText = `📊 <b>قائمة الباقات الاستثمارية وعوائدها المتاحة حالياً:</b><br><br>💰 سعر الباقة: <b>30 USDT</b><br>💵 العائد اليومي: <b>3.50 USDT</b><br>────────────────<br>💰 سعر الباقة: <b>60 USDT</b><br>💵 العائد اليومي: <b>7 USDT</b><br>────────────────<br>💰 سعر الباقة: <b>90 USDT</b><br>💵 العائد اليومي: <b>10 USDT</b><br>────────────────<br>💰 سعر الباقة: <b>150 USDT</b><br>💵 العائد اليومي: <b>18 USDT</b><br>────────────────<br>💰 سعر الباقة: <b>300 USDT</b><br>💵 العائد اليومي: <b>40 USDT</b><br>────────────────`;
        } 
        else {
          fullText = `مرحباً بك عزيزي المستخدم، يرجى تزويدنا بتفاصيل المشكلة أو اللقطات عبر بريدنا الإلكتروني الرسمي لحلها فوراً:<br><span style="color:#007bff; font-weight:bold; word-break:break-all;">mj4433314@gmail.com</span>`;
        }

        const botBubbleId = "bot-" + Date.now();
        const botBubble = `<div class="msg-bubble msg-in" id="${botBubbleId}"></div>`;
        chatBody.innerHTML += botBubble;
        chatBody.scrollTop = chatBody.scrollHeight;

        let currentIdx = 0;
        const targetElement = document.getElementById(botBubbleId);

        function typeWriter() {
          if (currentIdx < fullText.length) {
            if (fullText.substr(currentIdx, 1) === "<") {
              const closingIdx = fullText.indexOf(">", currentIdx);
              targetElement.innerHTML += fullText.substring(currentIdx, closingIdx + 1);
              currentIdx = closingIdx + 1;
            } else {
              targetElement.innerHTML += fullText.substr(currentIdx, 1);
              currentIdx++;
            }
            chatBody.scrollTop = chatBody.scrollHeight;
            setTimeout(typeWriter, 12);
          }
        }
        typeWriter();
      }, 1000);
    }
  </script>

</body>
</html>
