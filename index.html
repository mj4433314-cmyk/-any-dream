<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب وتداول</title>
    <!-- استدعاء الخطوط والأيقونات من خوادم سريعة -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cairo:wght@600;700&family=Reem+Kufi:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- ربط ملف التنسيق الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container" id="appCard">
        <!-- ترويسة الصفحة -->
        <div class="header">
            <span class="login-link" id="loginBtn">تسجيل الدخول</span>
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-circle-notch"></i></div>
            </div>
        </div>

        <!-- العنوان الممدود -->
        <h1 class="main-title">إنْشَـــاء حِـــسَاب</h1>

        <!-- الحقول والمدخلات -->
        <div class="input-wrapper">
            <label class="input-label">بريدك الإلكتروني/الهاتف</label>
            <div class="field-container">
                <select id="country-code" class="country-dropdown">
                    <option value="+964">🇮🇶 +964</option>
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+971">🇦🇪 +971</option>
                    <option value="+20">🇪🇬 +20</option>
                </select>
                <input type="text" id="identifier-input" placeholder="البريد الإلكتروني/رقم الهاتف (من دون رمز الدولة)">
            </div>
        </div>

        <div class="input-wrapper">
            <label class="input-label">رمز الإحالة <span class="arrow-down">▲</span></label>
            <div class="field-container">
                <input type="text" id="referral-input" placeholder="أدخل رمز الإحالة">
            </div>
        </div>

        <!-- زر المتابعة التفاعلي -->
        <button class="next-btn" id="submitBtn">
            <span id="btnText">التالي</span>
            <div class="spinner" id="btnSpinner"></div>
        </button>

        <div class="divider-text">أو المتابعة باستخدام</div>

        <div class="social-buttons">
            <div class="social-btn">
                <span>Google</span>
                <i class="fa-brands fa-google social-icon-g"></i>
            </div>
            <div class="social-btn">
                <span>Apple</span>
                <i class="fa-brands fa-apple"></i>
            </div>
            <div class="social-btn">
                <span>Telegram</span>
                <i class="fa-brands fa-telegram social-icon-t"></i>
            </div>
        </div>

        <div class="footer-lang">
            <span>بالعربية</span>
            <i class="fa-solid fa-globe"></i>
        </div>

        <!-- شريط التداول والعملات المتحرك في الأسفل -->
        <div class="trading-footer">
            <div class="trading-title">الأسواق الحية</div>
            <div class="ticker-container">
                <div class="crypto-item" id="btc-item">
                    <span class="crypto-name">BTC/USDT</span>
                    <span class="crypto-price" id="btc-price">92,450.50</span>
                    <span class="crypto-change positive" id="btc-change">+1.45%</span>
                </div>
                <div class="crypto-item" id="eth-item">
                    <span class="crypto-name">ETH/USDT</span>
                    <span class="crypto-price" id="eth-price">3,120.25</span>
                    <span class="crypto-change positive" id="eth-change">+0.82%</span>
                </div>
                <div class="crypto-item" id="sol-item">
                    <span class="crypto-name">SOL/USDT</span>
                    <span class="crypto-price" id="sol-price">184.10</span>
                    <span class="crypto-change negative" id="sol-change">-2.15%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة الرسالة الاحترافية المنبثقة -->
    <div class="modal-overlay" id="alertModal">
        <div class="modal-box">
            <div class="modal-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
            <div class="modal-text">عذراً، ليس لديك حساب مسبقاً!</div>
            <button class="modal-btn" id="closeModal">حسناً</button>
        </div>
    </div>

    <!-- كود الجافا سكربت للمنطق الذكي والأسعار المتغيرة كل 10 ثوانٍ -->
    <script>
        // إعدادات الحقل الذكي لرموز الدول
        const inputField = document.getElementById('identifier-input');
        const countryDropdown = document.getElementById('country-code');

        inputField.addEventListener('input', function() {
            const value = this.value.trim();
            const isNumeric = /^[0-9+]+$/.test(value);

            if (isNumeric && value.length > 0) {
                countryDropdown.classList.add('show');
                inputField.style.paddingRight = "10px";
            } else {
                countryDropdown.classList.remove('show');
                inputField.style.paddingRight = "16px";
            }
        });

        // منطق رسالة التنبيه "عذراً ليس لديك حساب مسبقاً"
        const loginBtn = document.getElementById('loginBtn');
        const alertModal = document.getElementById('alertModal');
        const closeModal = document.getElementById('closeModal');

        loginBtn.addEventListener('click', () => { alertModal.classList.add('active'); });
        closeModal.addEventListener('click', () => { alertModal.classList.remove('active'); });

        // منطق زر "التالي" (اللودينج والاهتزاز)
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const appCard = document.getElementById('appCard');

        submitBtn.addEventListener('click', () => {
            appCard.classList.add('shake-active');
            setTimeout(() => { appCard.classList.remove('shake-active'); }, 600);

            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';
            submitBtn.style.pointerEvents = 'none';
            submitBtn.style.backgroundColor = '#8daeff';

            setTimeout(() => {
                btnText.style.display = 'block';
                btnSpinner.style.display = 'none';
                submitBtn.style.pointerEvents = 'auto';
                submitBtn.style.backgroundColor = '#adc6ff';
            }, 10000);
        });

        // منطق محاكاة التداول: تحديث الأرقام عشوائياً وبشكل حيوي كل 10 ثوانٍ
        function updateTradingPrices() {
            const tickers = [
                { id: 'btc', basePrice: 92450, digits: 2 },
                { id: 'eth', basePrice: 3120, digits: 2 },
                { id: 'sol', basePrice: 184, digits: 2 }
            ];

            tickers.forEach(ticker => {
                const priceEl = document.getElementById(`${ticker.id}-price`);
                const changeEl = document.getElementById(`${ticker.id}-change`);
                const itemEl = document.getElementById(`${ticker.id}-item`);

                // حساب سعر ونسبة عشوائية جديدة للتداول
                const changePercent = (Math.random() * 4 - 2).toFixed(2); // نسبة بين -2% و +2%
                const priceFactor = 1 + (parseFloat(changePercent) / 100);
                const newPrice = (ticker.basePrice * priceFactor).toFixed(ticker.digits);

                // تغيير النصوص في الصفحة
                priceEl.innerText = parseFloat(newPrice).toLocaleString('en-US', { minimumFractionDigits: 2 });
                
                if (changePercent >= 0) {
                    changeEl.innerText = `+${changePercent}%`;
                    changeEl.className = 'crypto-change positive';
                    itemEl.style.borderRight = '3px solid #22c55e'; // وميض أخضر خفيف من الجانب
                } else {
                    changeEl.innerText = `${changePercent}%`;
                    changeEl.className = 'crypto-change negative';
                    itemEl.style.borderRight = '3px solid #ef4444'; // وميض أحمر خفيف من الجانب
                }

                // وميض حركي عند تحديث الرقم
                priceEl.style.transform = 'scale(1.05)';
                setTimeout(() => { priceEl.style.transform = 'scale(1)'; }, 300);
            });
        }

        // تشغيل التحديث التلقائي الفوري وكل 10 ثوانٍ دقيقة
        setInterval(updateTradingPrices, 10000);
    </script>
</body>
</html>
