<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KXTRM - Watch and Earn</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #5d25cc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }
        .main-card {
            background: rgba(20, 15, 35, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h2 { color: #ffffff; font-size: 26px; margin-bottom: 8px; }
        p { color: #b3a2db; font-size: 14px; margin-bottom: 30px; }
        input, button { width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: 1px solid #432194; box-sizing: border-box; font-size: 16px; }
        input { background: #1a0f35; color: #fff; text-align: right; }
        input:focus { border-color: #9d73f7; outline: none; }
        button { background-color: #9d73f7; color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        button:hover { background-color: #8350eb; }
        .footer-text { font-size: 12px; color: #b3a2db; margin-top: 20px; letter-spacing: 1px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-card">
        <h2>KXTRM</h2>
        <p>إنشاء حساب جديد للمتابعة وتشغيل الخدمة</p>
        <form action="/api/register" method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم أو البريد" required>
            <input type="password" name="password" placeholder="اختر كلمة مرور للموقع" required>
            <button type="submit">🛡️ إنشاء الحساب والانتقال للدفع</button>
        </form>
        <div class="footer-text">WATCH AND EARN USD</div>
    </div>
</body>
</html>
