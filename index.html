<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA AUTOMATED PLATFORM</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link href="https://googleapis.com" rel="stylesheet">
   <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: #0a0a0a; color: #ffffff; padding-bottom: 90px; overflow-x: hidden; }
    .tab-content { display: none; padding: 20px; max-width: 440px; margin: 0 auto; }
    .tab-content.active { display: block; }
    .page-title { color: #b8ff1a; text-align: center; font-size: 24px; font-weight: 900; letter-spacing: 1px; margin-top: 15px; margin-bottom: 25px; }
    
    .auth-container { max-width: 440px; margin: 20px auto; padding: 20px; background: #111111; border-radius: 24px; border: 1px solid #222222; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: right; }
    .auth-title { color: #b8ff1a; text-align: center; font-size: 28px; font-weight: 900; margin-bottom: 25px; }
    .auth-field-group { margin-bottom: 15px; }
    .auth-field-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; color: #aaaaaa; }
    .auth-field-group input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333333; background: #0a0a0a; color: #ffffff; font-size: 14px; text-align: left; transition: 0.3s; }
    .auth-field-group input:focus { border-color: #b8ff1a; outline: none; }
    .btn-auth-main { width: 100%; background: #b8ff1a; color: #000000; border: none; padding: 14px; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    .btn-auth-secondary { width: 100%; background: transparent; color: #aaaaaa; border: 1px solid #333333; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 12px; transition: 0.2s; }
         .status-animation-box { display: none; text-align: center; margin-top: 15px; padding: 12px; border-radius: 12px; background: #161616; border: 1px solid #262626; }
    .checking-text { color: #ffffff; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .checking-spinner { width: 18px; height: 18px; border: 2px solid #ffffff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .success-text { color: #2ecc71; font-weight: 900; font-size: 15px; display: none; align-items: center; justify-content: center; gap: 6px; }
    .success-badge-icon { background: #b8ff1a; color: #000000; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; box-shadow: 0 0 8px #b8ff1a; }
    .task-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); z-index: 4000; display: none; align-items: center; justify-content: center; }
    .task-modal-box { background: #111111; border: 1px solid #222222; border-radius: 28px; width: 85%; max-width: 360px; padding: 30px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); animation: modalFadeIn 0.3s ease; }
    .task-modal-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(234, 67, 53, 0.1); border: 2px solid #ea4335; color: #ea4335; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; margin: 0 auto 15px auto; }
    .task-modal-text { color: #ffffff; font-size: 16px; font-weight: bold; margin-bottom: 20px; line-height: 1.5; }
    .task-modal-btn { background: #ea4335; color: #ffffff; border: none; padding: 10px 30px; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; }
    
    .wallet-container { background: #ffffff; border-radius: 24px; padding: 20px; color: #000000; box-shadow: 0 8px 20px rgba(0,0,0,0.4); margin-bottom: 25px; text-align: center; }
    .wallet-main-balance { font-size: 42px; font-weight: 900; margin: 10px 0 20px 0; }
    .wallet-stats { border-top: 1px solid #eeeeee; padding-top: 15px; margin-bottom: 20px; display: flex; justify-content: space-around; }
    .stat-box { text-align: center; }
    .stat-title { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; color: #666666; }
    .stat-value { font-size: 16px; font-weight: 900; }
    .w-btn-withdraw { width: 100%; border-radius: 14px; padding: 14px; font-weight: bold; font-size: 15px; cursor: pointer; border: none; display: block; }
    .withdraw-form { display: none; margin-top: 20px; text-align: right; border-top: 1px solid #eee; padding-top: 15px; }
    .withdraw-field-group { margin-bottom: 12px; }
    .withdraw-field-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #333; }
    .withdraw-field-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; text-align: left; }
    .btn-confirm-withdraw-green { width: 100%; background: #2ecc71; color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; }

    @keyframes modalFadeIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="taskModal" class="task-modal-overlay">
    <div class="task-modal-box">
      <div class="task-modal-icon">!</div>
      <div class="task-modal-text" id="modalText">عذراً انت لم تقم في الاشتراك</div>
      <button class="task-modal-btn" onclick="closeTaskModal()">موافق</button>
    </div>
  </div>

  <div id="authSection" class="tab-content active">
    <div class="auth-container">
      <div class="auth-title">NOVA PLATFORM</div>
      <div class="auth-field-group">
        <label>البريد الإلكتروني (Email)</label>
        <input type="email" id="authEmail" placeholder="name@example.com">
      </div>
      <div class="auth-field-group">
        <label>رمز الدعوة (Invitation Code) - اختياري</label>
        <input type="text" id="authInviteCode" placeholder="أدخل رمز الدعوة هنا">
      </div>
      <button class="btn-auth-main" id="sendBtn">إرسال رابط التحقق</button>
      
      <div class="status-animation-box" id="statusBox">
        <div class="checking-text" id="checkingState"><span class="checking-spinner"></span> جاري إرسال الرابط...</div>
        <div class="success-text" id="successState">تم إرسال رابط التفعيل! تفقد بريدك الإلكتروني <span class="success-badge-icon">✓</span></div>
      </div>
    </div>
  </div>
    <div id="mainSection" class="tab-content">
    <h2 class="page-title">لوحة تحكم المحفظة</h2>
    <div class="wallet-container">
      <div class="stat-title">الرصيد الإجمالي</div>
      <div class="wallet-main-balance">0.00 د.ع</div>
      <div class="wallet-stats">
        <div class="stat-box">
          <span class="stat-title">أرباح اليوم</span>
          <span class="stat-value" style="color: #2ecc71;">0.00</span>
        </div>
        <div class="stat-box">
          <span class="stat-title">الفريق</span>
          <span class="stat-value">0</span>
        </div>
      </div>
      <button class="w-btn-withdraw" style="background: #b8ff1a; color: #000;" onclick="toggleWithdrawForm()">سحب الأرباح</button>
      
      <div class="withdraw-form" id="withdrawForm">
        <div class="withdraw-field-group">
          <label>مبلغ السحب</label>
          <input type="number" placeholder="أدخل المبلغ بالدينار">
        </div>
        <div class="withdraw-field-group">
          <label>رقم محفظة زين كاش / آسيا حوالة</label>
          <input type="text" placeholder="077xxxxxxx">
        </div>
        <button class="btn-confirm-withdraw-green" onclick="submitWithdraw()">تأكيد السحب</button>
      </div>
    </div>
  </div>

  <script>
    function closeTaskModal() { document.getElementById('taskModal').style.display = 'none'; }
    function openTaskModal(text) { document.getElementById('modalText').innerText = text; document.getElementById('taskModal').style.display = 'flex'; }
    function toggleWithdrawForm() { const form = document.getElementById('withdrawForm'); form.style.display = form.style.display === 'block' ? 'none' : 'block'; }
    function submitWithdraw() { openTaskModal("جاري معالجة طلب السحب الخاص بك بنجاح."); }
  </script>
    <script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://gstatic.com";

    const firebaseConfig = {
      apiKey: "AIzaSyCB8b5zsvBgsjbVb2WyK0pqpIosGICIBqs",
      authDomain: "://firebaseapp.com",
      projectId: "nova-17247",
      storageBucket: "nova-17247.firebasestorage.app",
      messagingSenderId: "569316305954",
      appId: "1:569316305954:web:02f39277eeb2a69a17ee7b",
      measurementId: "G-VPDS33WWBG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    if (isSignInWithEmailLink(auth, window.location.href)) {
      let email = window.localStorage.getItem('emailForSignIn');
      if (!email) { email = window.prompt('الرجاء كتابة بريدك الإلكتروني مرة أخرى للتأكيد:'); }
      signInWithEmailLink(auth, email, window.location.href)
        .then((result) => {
          window.localStorage.removeItem('emailForSignIn');
          document.getElementById('authSection').style.display = 'none';
          document.getElementById('mainSection').style.display = 'block';
          alert("أهلاً بك! تم تفعيل حسابك بنجاح والدخول للمنصة.");
        })
        .catch((error) => { alert("انتهت صلاحية الرابط أو حدث خطأ: " + error.message); });
    }

    document.getElementById("sendBtn").addEventListener("click", () => {
      const email = document.getElementById("authEmail").value;
      if(!email) { alert("الرجاء كتابة البريد الإلكتروني أولاً!"); return; }

      const statusBox = document.getElementById("statusBox");
      const checkingState = document.getElementById("checkingState");
      const successState = document.getElementById("successState");

      statusBox.style.display = "block";
      checkingState.style.display = "flex";
      successState.style.display = "none";

      const actionCodeSettings = { url: window.location.href, handleCodeInApp: true };

      sendSignInLinkToEmail(auth, email, actionCodeSettings)
        .then(() => {
          window.localStorage.setItem('emailForSignIn', email);
          checkingState.style.display = "none";
          successState.style.display = "flex";
        })
        .catch((error) => {
          statusBox.style.display = "none";
          alert("خطأ أثناء الإرسال: " + error.message);
        });
    });
  </script>
</body>
</html>
