<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

background:#eef5ff;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

.container{

width:100%;

max-width:420px;

padding:25px;

}

.logo{

text-align:center;

margin-bottom:30px;

}

.logo h1{

color:#1565ff;

font-size:40px;

font-weight:800;

}

.logo p{

color:#666;

margin-top:8px;

}

.card{

background:#fff;

padding:25px;

border-radius:18px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.tabs{

display:flex;

margin-bottom:25px;

border-radius:12px;

overflow:hidden;

background:#edf4ff;

}

.tabs button{

flex:1;

padding:14px;

border:none;

background:none;

font-size:16px;

cursor:pointer;

font-weight:700;

}

.tabs button.active{

background:#1565ff;

color:#fff;

}

.input{

margin-bottom:16px;

}

.input label{

display:block;

margin-bottom:8px;

font-weight:700;

color:#444;

}

.input input{

width:100%;

padding:14px;

border:1px solid #dbe7ff;

border-radius:12px;

outline:none;

font-size:15px;

}

.input input:focus{

border-color:#1565ff;

}

.btn{

width:100%;

padding:15px;

border:none;

background:#1565ff;

color:#fff;

font-size:17px;

font-weight:bold;

border-radius:12px;

cursor:pointer;

transition:.25s;

}

.btn:hover{

background:#0e4fd8;

}

.small{

text-align:center;

margin-top:18px;

color:#777;

font-size:14px;

}

.hidden{

display:none;

}

</style>

</head>

<body>

<div class="container">
  <div class="logo">
<h1>HR</h1>
<p>منصة المهام والاستثمار</p>
</div>

<div class="card">

<div class="tabs">
<button class="active" onclick="showLogin()">تسجيل الدخول</button>
<button onclick="showRegister()">إنشاء حساب</button>
</div>

<!-- تسجيل الدخول -->

<div id="login">

<div class="input">
<label>اسم المستخدم</label>
<input type="text" placeholder="أدخل اسم المستخدم">
</div>

<div class="input">
<label>كلمة المرور</label>
<input type="password" placeholder="********">
</div>

<button class="btn" onclick="goHome()">
تسجيل الدخول
</button>

<div class="small">
ليس لديك حساب؟ اضغط على إنشاء حساب
</div>

</div>

<!-- إنشاء حساب -->

<div id="register" class="hidden">

<div class="input">
<label>اسم المستخدم</label>
<input type="text" placeholder="اسم المستخدم">
</div>

<div class="input">
<label>رقم الهاتف</label>
<input type="text" placeholder="07xxxxxxxxx">
</div>

<div class="input">
<label>كلمة المرور</label>
<input type="password" placeholder="********">
</div>

<div class="input">
<label>تأكيد كلمة المرور</label>
<input type="password" placeholder="********">
</div>

<div class="input">
<label>رمز الدعوة (اختياري)</label>
<input type="text" placeholder="HR2026">
</div>

<button class="btn" onclick="goHome()">
إنشاء الحساب
</button>

</div>

</div>
<script>

const login=document.getElementById("login");
const register=document.getElementById("register");

const tabs=document.querySelectorAll(".tabs button");

function showLogin(){

login.classList.remove("hidden");
register.classList.add("hidden");

tabs[0].classList.add("active");
tabs[1].classList.remove("active");

}

function showRegister(){

register.classList.remove("hidden");
login.classList.add("hidden");

tabs[1].classList.add("active");
tabs[0].classList.remove("active");

}

function goHome(){

window.location.href="home.html";

}

</script>

</div>

</body>
</html>
