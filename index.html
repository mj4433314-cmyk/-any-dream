<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading App</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="app">

<header class="header">
<h2>Global Trading</h2>
<p>Rewards Platform</p>
</header>

<section class="packages">

<div class="vip-card">
<h3>H1 VIP Package</h3>
<h1>30 USDT</h1>
<p>Daily: 4.58 USDT</p>
<button class="activate-btn">ACTIVATE</button>
</div>

<div class="vip-card">
<h3>H2 VIP Package</h3>
<h1>60 USDT</h1>
<p>Daily: 7 USDT</p>
<button class="activate-btn">ACTIVATE</button>
</div>

<div class="vip-card">
<h3>H3 VIP Package</h3>
<h1>90 USDT</h1>
<p>Daily: 10 USDT</p>
<button class="activate-btn">ACTIVATE</button>
</div>

<div class="vip-card">
<h3>H4 VIP Package</h3>
<h1>150 USDT</h1>
<p>Daily: 18 USDT</p>
<button class="activate-btn">ACTIVATE</button>
</div>

</section>
<section class="tasks">

<h2>Tasks</h2>

<div class="task-card">
<i class="fa-brands fa-youtube"></i>

<div>
<h3>YouTube Task</h3>
<p>Reward: 1 USDT</p>
</div>

<button onclick="showWallet()">Claim</button>
</div>

</section>

<section class="assets">

<h2>Assets</h2>

<div class="asset-card">
<h3>Balance</h3>
<h1>0.00 USDT</h1>
</div>

</section>

<nav class="bottom-nav">

<div class="nav-item active">
<i class="fa-solid fa-chart-line"></i>
<span>Trade</span>
</div>

<div class="nav-item">
<i class="fa-brands fa-youtube"></i>
<span>Tasks</span>
</div>

<div class="nav-item">
<i class="fa-solid fa-wallet"></i>
<span>Assets</span>
</div>

</nav>

</div>

<script src="script.js"></script>

</body>
</html>
