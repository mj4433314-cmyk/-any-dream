*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0047ff,#00a6ff);

overflow:hidden;

position:relative;

}

/* الخلفية */

body::before{

content:"";

position:absolute;

width:700px;

height:700px;

background:rgba(255,255,255,.08);

border-radius:50%;

left:-250px;

top:-250px;

animation:move1 18s linear infinite;

}

body::after{

content:"";

position:absolute;

width:600px;

height:600px;

background:rgba(255,255,255,.05);

border-radius:50%;

right:-200px;

bottom:-250px;

animation:move2 20s linear infinite;

}

@keyframes move1{

0%{transform:translateY(0) rotate(0deg);}

100%{transform:translateY(100px) rotate(360deg);}

}

@keyframes move2{

0%{transform:translateY(0) rotate(0deg);}

100%{transform:translateY(-120px) rotate(-360deg);}

}
