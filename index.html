<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Any Dream</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cloudflare.com">
  <style>
    /* تنسيق طبيعي ومفتوح للشعار بدون أي دوائر */
    .logo-container {
      text-align: center;
      margin-bottom: 25px;
      margin-top: 10px;
    }
    .main-app-logo {
      width: 160px;
      height: auto;
      object-fit: contain;
    }
    /* تنسيق لضمان ظهور صور العملات في الأسفل بشكل متناسق وصحيح */
    .coins {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      align-items: center;
    }
    .coins img {
      width: 35px;
      height: 35px;
      object-fit: contain;
    }
    .coins i {
      font-size: 35px;
      color: #f7931a; /* لون البتكوين البرتقالي */
    }
  </style>
</head>

<body>

<div class="login-page">
  <div class="login-box">
    
    <!-- الشعار مدمج بشكل طبيعي بدون دائرة -->
    <div class="logo-container">
      <img src="lokgo.png" alt="Any Dream Logo" class="main-app-logo">
    </div>

    <form id="registerForm">
      
      <div class="input-box">
        <i class="fa-solid fa-phone"></i>
        <input type="text" id="phone" placeholder="البريد الإلكتروني أو رقم الهاتف">
        <span id="countryCode"></span>
      </div>

      <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="كلمة السر">
      </div>

      <div class="input-box">
        <i class="fa-solid fa-user-plus"></i>
        <input type="text" id="inviteInput" placeholder="رمز الدعوة">
      </div>

      <button type="button" id="loginBtn" class="login-btn">
        تسجيل الدخول
      </button>

      <button type="button" id="createBtn" class="create-btn">
        إنشاء الحساب
      </button>

    </form>

    <!-- روابط إنترنت مباشرة وموثوقة للعملات لتظهر فوراً وبشكل ملون بدون ما ترفع أي ملف بنفسك -->
    <div class="coins">
      <img src="https://githubusercontent.com" alt="USDT">
      <img src="https://githubusercontent.com" alt="Solana">
      <i class="fab fa-bitcoin btc"></i>
    </div>

  </div>
</div>

<div id="loading">
  <div class="loader"></div>
  <h2>جاري إنشاء الحساب...</h2>
</div>

<script src="script.js"></script>

</body>
</html>
