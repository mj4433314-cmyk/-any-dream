<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

background:linear-gradient(135deg,#0d47a1,#1565ff,#42a5f5);

background-size:400% 400%;

animation:bg 12s ease infinite;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

overflow:hidden;

}

@keyframes bg{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.card{

width:100%;

max-width:420px;

background:white;

border-radius:25px;

padding:25px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.logo{

width:90px;

height:90px;

margin:auto;

border-radius:50%;

background:linear-gradient(135deg,#1565ff,#00c6ff);

display:flex;

justify-content:center;

align-items:center;

font-size:42px;

font-weight:900;

color:white;

}

h2{

text-align:center;

margin-top:15px;

color:#1565ff;

}

p{

text-align:center;

color:#777;

margin-bottom:20px;

}
  .input{
width:100%;
padding:15px;
margin-top:12px;
border:1px solid #d9e2f2;
border-radius:12px;
font-size:16px;
outline:none;
transition:.3s;
background:#fff;
}

.input:focus{
border-color:#1565ff;
box-shadow:0 0 10px rgba(21,101,255,.2);
}

.country{
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:1px solid #d9e2f2;
font-size:16px;
background:white;
outline:none;
}

.captcha-box{
display:flex;
gap:10px;
margin-top:15px;
}

#captcha{
flex:1;
height:60px;
background:#eef5ff;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
letter-spacing:4px;
color:#1565ff;
}

.refresh{
width:60px;
border:none;
border-radius:12px;
background:#1565ff;
color:white;
font-size:24px;
cursor:pointer;
}

.btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.login{
background:#1565ff;
color:white;
}

.register{
background:#14a44d;
color:white;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.message{
text-align:center;
margin-top:15px;
min-height:25px;
font-weight:bold;
color:#e53935;
}
