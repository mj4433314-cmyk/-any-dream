<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KXTRM - Watch and Earn</title>
    <style>
        /* تعيين الخلفية البنفسجية الكاملة للموقع وتنسيق الشاشة */
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #5d25cc; /* اللون البنفسجي المعتمد */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        /* تصميم البطاقة الزجاجية الداكنة في المنتصف */
        .main-card {
            background: rgba(20, 15, 35, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        /* تنسيق وحجم الشعار الشفاف */
        .logo-container .site-logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 25px;
            display: inline-block;
        }

        /* تنسيق رابط الموقع الأبيض المحدد بالأسود */
        .url-text {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-bottom: 15px;
            word-break: break-all;
        }

        /* تنسيق النص الوصفي */
        .sub-text {
            font-size: 14px;
            color: #cccccc;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* تصميم الزر الأخضر المشع والمميز */
        .green-btn {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(90deg, #00b894, #00ecb9);
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            padding: 14px 35px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 184, 148, 0.5);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* تأثير التمرير الفأري فوق الزر لزيادة التوهج */
        .green-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 236, 185, 0.8);
            background: linear-gradient(90deg, #00ecb9, #00b894);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- قسم الشعار الشفاف الخاص بك -->
        <div class="logo-container">
            <img src="logo.png" alt="KXTRM Logo" class="site-logo">
        </div>
        
        <!-- رابط الموقع الخاص بك -->
        <div class="url-text">
            https://workers.dev
        </div>
        
        <!-- النص الوصفي بالإنجليزية المعتمد في التصميم -->
        <p class="sub-text">
            Start your journey to earning USD effortlessly. Watch. Earn. Repeat.
        </p>
        
        <!-- الزر الأخضر التفاعلي الجديد -->
        <a href="#" class="green-btn">WATCH AND EARN USD</a>
    </div>

</body>
</html>
