<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التداول الاحترافية - لوحة التحكم</title>
    <!-- استدعاء خط Cairo والأيقونات من خوادم سريعة آمنة -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* كود الـ CSS مدمج هنا لضمان عمل الألوان والتصميم فوراً */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: #121212;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            padding: 0 !important;
        }

        .dark-dashboard {
            background-color: #121212;
            color: #ffffff;
            min-height: 580px;
            padding: 20px 15px 80px 15px;
            display: flex;
            flex-direction: column;
            direction: ltr;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .dash-user {
            font-size: 24px;
            color: #262626;
        }

        .dash-actions {
            display: flex;
            gap: 18px;
            font-size: 18px;
            color: #262626;
        }

        .balance-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #232323;
        }

        .balance-title {
            width: 40%;
            height: 12px;
            background: #262626;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .balance-amount {
            width: 60%;
            height: 24px;
            background: #262626;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .balance-buttons {
            display: flex;
            gap: 10px;
        }

        .dash-action-btn {
            flex: 1;
            height: 38px;
            background: #262626;
            border: none;
            border-radius: 8px;
        }

        .deposit {
            background: #1a1a1a;
            border: 1px solid #262626;
        }

        .skeleton-block {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .grid-2 {
            flex-direction: row;
            gap: 15px;
        }

        .sk-box {
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #232323;
        }

        .sk-box.long {
            flex: 1;
            height: 90px;
        }

        .sk-box.banner {
            height: 120px;
            width: 100%;
        }

        .sk-line {
            height: 12px;
            background: #1a1a1a;
            border-radius: 6px;
            width: 100%;
        }

        .sk-line.short { width: 40%; }
        .sk-line.title { width: 25%; height: 16px; margin-bottom: 5px; }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #121212;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 5px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #404040;
            cursor: pointer;
            transition: color 0.2s ease;
            flex: 1;
            height: 100%;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- لوحة التحكم الهيكلية المعتمة بالكامل -->
        <div id="dashboard-step" class="dark-dashboard">
            <div class="dash-header">
                <div class="dash-user"><i class="fa-solid fa-circle-user"></i></div>
                <div class="dash-actions">
                    <i class="fa-solid fa-bell"></i>
                    <i class="fa-solid fa-qrcode"></i>
                </div>
            </div>

            <div class="balance-card">
                <div class="balance-title"></div>
                <div class="balance-amount"></div>
                <div class="balance-buttons">
                    <button class="dash-action-btn deposit"></button>
                    <button class="dash-action-btn"></button>
                </div>
            </div>

            <div class="skeleton-block grid-2">
                <div class="sk-box long"></div>
                <div class="sk-box long"></div>
            </div>
            <div class="skeleton-block">
                <div class="sk-line title"></div>
                <div class="sk-box banner"></div>
            </div>
            <div class="skeleton-block">
                <div class="sk-line"></div>
                <div class="sk-line short"></div>
                <div class="sk-line"></div>
            </div>

            <!-- أزرار التحكم السفلية بدون أسماء كالصورة تماماً -->
            <div class="bottom-nav">
                <div class="nav-item active">
                    <i class="fa-solid fa-house"></i>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-chart-simple"></i>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-right-left"></i>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-briefcase"></i>
                </div>
            </div>
        </div>

    </div>

    <script>
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
