<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أي حلم | Any Dream</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06040a 100%); 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            max-width: 450px; 
            width: 100%; 
            text-align: center; 
        }
        .icon { font-size: 50px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        h1 { font-size: 28px; margin-bottom: 15px; color: #b39ddb; text-shadow: 0 0 10px rgba(179,157,219,0.3); }
        p { font-size: 16px; color: #b0aec4; line-height: 1.6; margin-bottom: 25px; }
        .btn { 
            display: inline-block; 
            background: linear-gradient(45deg, #7c4dff, #448aff); 
            color: white; 
            padding: 12px 30px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4);
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124, 77, 255, 0.6); }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🌌</div>
        <h1>موقع أي حلم</h1>
        <p>مرحباً بك في فضائي الخاص. هنا تبدأ الأفكار الكبيرة وتتحول الأحلام إلى واقع رقمي ملموس.</p>
        <a href="#" class="btn">اكتشف المزيد</a>
    </div>
</body>
</html>
