<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Invest</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{
background:#eef4ff;
}

.header{
background:#2563eb;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#fff;
border-radius:15px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
background:#2563eb;
color:#fff;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.box{
background:white;
padding:15px;
text-align:center;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.menu{
margin-top:20px;
}

.item{
background:white;
padding:16px;
margin-bottom:10px;
border-radius:12px;
font-size:18px;
font-weight:bold;
display:flex;
justify-content:space-between;
cursor:pointer;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<div class="header">
Dream Invest
</div>

<div class="container">

<div class="card">

<h2>تسجيل الدخول</h2>

<input placeholder="رقم الهاتف">

<input type="password" placeholder="كلمة المرور">

<button>دخول</button>

</div>

<div class="stats">

<div class="box">
الرصيد<br>
0 USDT
</div>

<div class="box">
الأرباح<br>
0
</div>

<div class="box">
المهام<br>
0
</div>

<div class="box">
الإحالات<br>
0
</div>

</div>

<div class="menu">

<div class="item">
💰 شحن الحساب
</div>

<div class="item">
💸 سحب
</div>

<div class="item">
📦 الاشتراكات
</div>

<div class="item">
👥 الإحالات
</div>

<div class="item">
📄 سجل العمليات
</div>

<div class="item">
🏦 عنوان المحفظة
<br>
<small>THJN4XBKxbZNYsw7YAHmNiZSupn3kVEDFP</small>
</div>

</div>

</div>

</body>
</html>
