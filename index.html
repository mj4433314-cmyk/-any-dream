<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب</title>
    <!-- استدعاء خط Cairo الأنيق وFontAwesome للأيقونات -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        /* الحاوية الرئيسية للتطبيق */
        .app-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
        }

        /* ترويسة الصفحة (اللوجو ورابط الدخول) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .login-link {
            color: #4c8bf5;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
        }

        .logo-icon {
            font-size: 32px;
            color: #0066ff;
            transform: rotate(-45deg);
        }

        /* العنوان الرئيسي */
        .main-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 25px;
        }

        /* تنسيق الحقول */
        .input-wrapper {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #4a4a4a;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .arrow-down {
            font-size: 10px;
            color: #666;
            margin-right: 4px;
        }

        /* حاوية حقل الإدخال لدمج قائمة الدول بداخلها */
        .field-container {
            display: flex;
            align-items: center;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background-color: #ffffff;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .field-container:focus-within {
            border-color: #a3bffa;
            box-shadow: 0 0 0 3px rgba(163, 191, 250, 0.2);
        }

        .field-container input {
            width: 100%;
            padding: 16px;
            border: none;
            outline: none;
            font-size: 15px;
            color: #1a1a1a;
            background: transparent;
        }

        .field-container input::placeholder {
            color: #b0b0b0;
        }

        /* تصميم قائمة رموز الدول الذكية */
        .country-dropdown {
            display: none; /* مخفية بالوضع الافتراضي للبريد */
            border: none;
            outline: none;
            background: #f7fafc;
            padding: 0 10px;
            height: 100%;
            font-size: 14px;
            color: #333;
            border-left: 1px solid #e2e8f0;
            cursor: pointer;
        }

        /* كلاس مخصص يضاف بواسطة الجافا سكربت عند كتابة الأرقام */
        .country-dropdown.show {
            display: block;
        }

        /* زر التالي الأزرق الفاتح */
        .next-btn {
            width: 100%;
            background-color: #adc6ff;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 25px;
            transition: background-color 0.2s;
        }

        .next-btn:hover {
            background-color: #8daeff;
        }

        /* نص الفصل بين الطرق */
        .divider-text {
            text-align: center;
            color: #888888;
            font-size: 13px;
            margin-bottom: 20px;
            position: relative;
        }

        /* أزرار التواصل الاجتماعي */
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .social-btn {
            width: 100%;
            background-color: #f5f5f5;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            transition: background-color 0.2s;
            text-decoration: none;
        }

        .social-btn:hover {
            background-color: #ededed;
        }

        .social-btn i {
            font-size: 20px;
        }

        .social-icon-g { color: #ea4335; }
        .social-icon-t { color: #0088cc; }

        /* التذييل للغة */
        .footer-lang {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: #333333;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- ترويسة الصفحة -->
        <div class="header">
            <a href="#" class="login-link">تسجيل الدخول</a>
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-circle-notch"></i></div>
            </div>
        </div>

        <h1 class="main-title">إنشاء حساب</h1>

        <!-- حقل البريد الإلكتروني / الهاتف الذكي -->
        <div class="input-wrapper">
            <label class="input-label">بريدك الإلكتروني/الهاتف</label>
            <div class="field-container">
                <!-- قائمة رموز الدول (تظهر بالرقم فقط) -->
                <select id="country-code" class="country-dropdown">
                    <option value="+964">🇮🇶 +964</option>
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+971">🇦🇪 +971</option>
                    <option value="+20">🇪🇬 +20</option>
                    <option value="+962">🇯🇴 +962</option>
                </select>
                <input type="text" id="identifier-input" placeholder="البريد الإلكتروني/رقم الهاتف (من دون رمز الدولة)">
            </div>
        </div>

        <!-- حقل رمز الإحالة -->
        <div class="input-wrapper">
            <label class="input-label">رمز الإحالة <span class="arrow-down">▲</span></label>
            <div class="field-container">
                <input type="text" placeholder="أدخل رمز الإحالة">
            </div>
        </div>

        <!-- زر المتابعة الرئيسي -->
        <button class="next-btn">التالي</button>

        <div class="divider-text">أو المتابعة باستخدام</div>

        <!-- أزرار تسجيل الدخول الاجتماعي -->
        <div class="social-buttons">
            <div class="social-btn">
                <span>Google</span>
                <i class="fa-brands fa-google social-icon-g"></i>
            </div>
            <div class="social-btn">
                <span>Apple</span>
                <i class="fa-brands fa-apple"></i>
            </div>
            <div class="social-btn">
                <span>Telegram</span>
                <i class="fa-brands fa-telegram social-icon-t"></i>
            </div>
        </div>

        <!-- التذييل الخاص باللغة -->
        <div class="footer-lang">
            <span>بالعربية</span>
            <i class="fa-solid fa-globe"></i>
        </div>
    </div>

    <!-- كود الجافا سكربت للتحكم الذكي بمربع النص -->
    <script>
        const inputField = document.getElementById('identifier-input');
        const countryDropdown = document.getElementById('country-code');

        inputField.addEventListener('input', function() {
            const value = this.value.trim();
            const isNumeric = /^[0-9+]+$/.test(value);

            if (isNumeric && value.length > 0) {
                countryDropdown.classList.add('show');
                inputField.style.paddingRight = "10px";
            } else {
                countryDropdown.classList.remove('show');
                inputField.style.paddingRight = "16px";
            }
        });
    </script>
</body>
</html>
