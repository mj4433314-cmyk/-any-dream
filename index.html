<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Any Dream</title>

<link rel="stylesheet" href="style.css">

<style>
.packages{
display:grid;
grid-template-columns:1fr;
gap:15px;
margin-top:20px;
}

.package{
background:#151c2f;
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.package:hover{
transform:scale(1.02);
}

.package img{
width:100%;
display:block;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#151c2f;
width:90%;
max-width:380px;
padding:20px;
border-radius:20px;
text-align:center;
animation:show .3s;
}

@keyframes show{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.wallet{
background:#0d1324;
padding:12px;
border-radius:10px;
font-size:13px;
word-break:break-all;
color:#00ff99;
margin:15px 0;
}

.copy-btn{
width:100%;
height:45px;
border:none;
border-radius:30px;
background:#00b894;
color:#fff;
font-size:17px;
margin-bottom:10px;
}

.close-btn{
width:100%;
height:45px;
border:none;
border-radius:30px;
background:#ff3b30;
color:#fff;
font-size:17px;
}
</style>

</head>

<body>

<div class="app">

<div class="header">
<h2>ANY DREAM</h2>
<p>اختر إحدى الباقات</p>
</div>

<div class="packages">

<div class="package" onclick="openWallet()">
<img src="h1.png">
</div>

<div class="package" onclick="openWallet()">
<img src="h2.png">
</div>

<div class="package" onclick="openWallet()">
<img src="h3.png">
</div>

<div class="package" onclick="openWallet()">
<img src="h4.png">
</div>

</div>

</div>

<div class="modal" id="walletBox">

<div class="modal-content">

<h2>محفظة TRC20</h2>

<div class="wallet" id="wallet">
THJN4XBKxbZNYsw7YAHmNiZSupn3kVEDFP
</div>

<button class="copy-btn" onclick="copyWallet()">
نسخ عنوان المحفظة
</button>

<button class="close-btn" onclick="closeWallet()">
إغلاق
</button>

</div>

</div>

<script>

function openWallet(){
document.getElementById("walletBox").style.display="flex";
}

function closeWallet(){
document.getElementById("walletBox").style.display="none";
}

function copyWallet(){

const text="THJN4XBKxbZNYsw7YAHmNiZSupn3kVEDFP";

navigator.clipboard.writeText(text);

alert("تم نسخ عنوان المحفظة");

}

</script>

</body>
</html>
