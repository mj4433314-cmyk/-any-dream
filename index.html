<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <!-- استدعاء خط Cairo الاحترافي من جوجل -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            /* تدرج الألوان المطابق تماماً للصورة المرسلة */
            background: linear-gradient(135deg, #10041d 0%, #24093b 40%, #c41c8c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            /* تصميم زجاجي عصري يتناسب مع الخلفية */
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* تنسيق اللوجو ثلاثي الأبعاد المرفق */
        .logo-container {
            margin-bottom: 25px;
        }
        .logo-container img {
            width: 90px;
            height: auto;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
        }

        h2 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #b3a0c2;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            color: #e2d5ed;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            padding-right: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 5, 25, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            text-align: right;
        }

        .input-group input:focus {
            border-color: #c41c8c;
            box-shadow: 0 0 12px rgba(196, 28, 140, 0.3);
            background: rgba(15, 5, 25, 0.8);
        }

        /* تنسيق خانة رمز التحقق والصورة */
        .captcha-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .captcha-wrapper input {
            flex: 1;
        }

        .captcha-image-box {
            background: #ffffff;
            height: 48px;
            width: 120px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
        }

        .captcha-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #c41c8c 0%, #851263 100%);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(196, 28, 140, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(196, 28, 140, 0.5);
            filter: brightness(1.1);
        }

        .submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="register-container">
        <!-- قسم الشعار المرفق بالصورة -->
        <div class="logo-container">
            <!-- ملاحظة: يمكنك رفع صورة الديسكورد وتسميتها logo.png بجانب هذا الملف ليظهر التصميم كاملاً -->
            <img src="logo.png" alt="الشعار" onerror="this.src='https://website-files.com'; this.style.filter='none'">
        </div>

        <h2>إنشاء حساب جديد</h2>
        <p class="subtitle">أدخل بياناتك للانضمام إلينا</p>

        <form onsubmit="event.preventDefault(); alert('تم الضغط على التسجيل بنجاح!');">
            <!-- اسم المستخدم -->
            <div class="input-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسم المستخدم المفضل" required>
            </div>

            <!-- البريد الإلكتروني -->
            <div class="input-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@domain.com" required>
            </div>

            <!-- كلمة السر -->
            <div class="input-group">
                <label for="password">كلمة السر</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <!-- رمز الدعوة -->
            <div class="input-group">
                <label for="invite-code">رمز الدعوة (اختياري)</label>
                <input type="text" id="invite-code" placeholder="أدخل رمز الدعوة إذا وجد">
            </div>

            <!-- رمز التحقق المرئي -->
            <div class="input-group">
                <label for="captcha">رمز التحقق</label>
                <div class="captcha-wrapper">
                    <input type="text" id="captcha" placeholder="أدخل الرمز الموضح" required>
                    <div class="captcha-image-box">
                        <!-- هنا تضع رابط صورة الكابتشا الخاصة بسيرفرك، وضعت صورة تجريبية مؤقتاً -->
                        <img src="https://rawpixel.com" alt="Captcha">
                    </div>
                </div>
            </div>

            <!-- زر التسجيل -->
            <button type="submit" class="submit-btn">تسجيل الحساب</button>
        </form>
    </div>

</body>
</html>
