<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Any Dream</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="login-page">

<div class="login-box">

<h1>Any Dream</h1>

<p>منصة التداول والمكافآت العالمية</p>

<form id="registerForm">

<div class="input-box">
<i class="fa-solid fa-phone"></i>

<input type="text" id="phone" placeholder="البريد الإلكتروني أو رقم الهاتف">

<span id="countryCode"></span>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input type="password" placeholder="كلمة السر">

</div>

<div class="input-box">

<i class="fa-solid fa-user-plus"></i>

<input type="text" placeholder="رمز الدعوة">

</div>

<button type="button" id="loginBtn" class="login-btn">
تسجيل الدخول
</button>

<button type="button" id="createBtn" class="create-btn">
إنشاء الحساب
</button>

</form>

<div class="coins">

<i class="fab fa-bitcoin btc"></i>

<img src="https://cryptologos.cc/logos/solana-sol-logo.png" class="coin">

<img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="coin">

</div>

</div>

</div>

<div id="loading">

<div class="loader"></div>

<h2>جاري إنشاء الحساب...</h2>

</div>

<script src="script.js"></script>

</body>

</html>
