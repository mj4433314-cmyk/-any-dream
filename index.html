<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA</title>

<link href="https://googleapis.com" rel="stylesheet">
<!-- إضافة مكتبة أيقونات Font Awesome لتشغيل شكل العين -->
<link rel="stylesheet" href="https://cloudflare.com">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body{
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container{
    max-width: 500px;
    width: 100%;
    text-align: center;
}

.logo{
    font-size: 42px;
    font-weight: 900;
    color: #b8ff1a;
    margin-bottom: 20px;
}

.welcome{
    font-size: 30px;
    font-weight: 900;
    line-height: 1.8;
    margin-bottom: 25px;
}

/* حاوية مربعات الإدخال */
.auth-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 20px;
    width: 100%;
}

.auth-container input {
    width: 100%;
    padding: 16px;
    border-radius: 15px;
    border: 1px solid #333;
    background-color: #111;
    color: #fff;
    font-size: 16px;
    text-align: right;
    outline: none;
    transition: border-color 0.3s;
}

/* حاوية مخصصة لمربع كلمة السر والعين */
.password-wrapper {
    position: relative;
    width: 100%;
}

/* تعديل مساحة الكتابة في حقل السر حتى لا تتداخل مع العين */
.password-wrapper input {
    padding-left: 50px; 
}

/* تنسيق أيقونة العين لتظهر جهة اليسار بشكل متناسق */
.toggle-password {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #888;
    font-size: 18px;
    transition: color 0.3s;
}

.toggle-password:hover {
    color: #b8ff1a;
}

/* تأثير الإضاءة الفسفورية عند تحديد المربع */
.auth-container input:focus {
    border-color: #b8ff1a;
}

/* مجموعة الأزرار أسفل المربعات مباشرة */
.buttons-group {
    display: flex;
    gap: 12px;
    width: 100%;
    margin-bottom: 30px;
}

.btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    transition: opacity .2s;
}

/* زر إنشاء حساب (فسفوري) */
.btn-primary {
    background: #b8ff1a;
    color: #000;
}

/* زر تسجيل الدخول (داكن بحدود فسفورية) */
.btn-secondary {
    background: transparent;
    color: #fff;
    border: 2px solid #b8ff1a;
}

.btn:hover {
    opacity: .9;
}

/* النصوص في الأسفل تماماً */
.desc{
    font-size: 18px;
    line-height: 2;
    color: #ddd;
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">NOVA</div>

    <div class="welcome">
        WELCOME TO NOVA PLATFORM
    </div>

    <!-- المربعات الأربعة في الأعلى -->
    <div class="auth-container">
        <input type="text" id="userInput" placeholder="اسم المستخدم" required>
        <input type="email" id="emailInput" placeholder="البريد الإلكتروني (Gmail)" required>
        
        <!-- حقل كلمة السر المطور مع أيقونة العين -->
        <div class="password-wrapper">
            <input type="password" id="passwordInput" placeholder="كلمة السر" required>
            <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
        </div>
        
        <input type="number" id="statusInput" placeholder="رقم الحالة" required>
    </div>

    <!-- الأزرار أسفل المربعات مباشرة -->
    <div class="buttons-group">
        <button class="btn btn-primary" onclick="register()">
            إنشاء حساب
        </button>
        <button class="btn btn-secondary" onclick="login()">
            تسجيل الدخول
        </button>
    </div>

    <!-- النصوص الإنجليزية في الأسفل تماماً -->
    <div class="desc">
        Welcome to Nova Platform.<br>
        We provide comprehensive support for our users.<br><br>
        
        Watch approved video content and complete available tasks through the platform.<br><br>
        
        Invite your friends and receive referral rewards according to the platform rules.
    </div>

</div>

<script>
// كود تشغيل ميزة إظهار وإخفاء كلمة السر عند الضغط على العين
const togglePassword = document.querySelector('#togglePassword');
const passwordInput = document.querySelector('#passwordInput');

togglePassword.addEventListener('click', function () {
    // تبديل نوع الحقل بين password و text
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    
    // تبديل شكل الأيقونة بين العين المفتوحة والمغلقة
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
});

function login(){
    var user = document.getElementById("userInput").value;
    var email = document.getElementById("emailInput").value;
    var password = document.getElementById("passwordInput").value;
    var statusNum = document.getElementById("statusInput").value;
    
    if(user === "" || email === "" || password === "" || statusNum === "") {
        alert("الرجاء ملء جميع الحقول أولاً بما فيها رقم الحالة.");
    } else {
        alert("عذراً، ليس لديك حساب مسبقاً.");
    }
}

function register(){
    var user = document.getElementById("userInput").value;
    var email = document.getElementById("emailInput").value;
    var password = document.getElementById("passwordInput").value;
    var statusNum = document.getElementById("statusInput").value;
    
    if(user === "" || email === "" || password === "" || statusNum === "") {
        alert("الرجاء إدخال جميع البيانات ورقم الحالة لإنشاء الحساب.");
    } else {
        alert("تم إنشاء الحساب بنجاح برقم الحالة (" + statusNum + ")، مرحباً بك يا " + user + " في منصة NOVA.");
    }
}
</script>

</body>
</html>
