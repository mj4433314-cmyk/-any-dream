<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة HR الرقمية - نظام OKX والمهام</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background-color: #000000;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
    }

    #okxParticleCanvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 1;
        pointer-events: none;
    }
</style>
<style>
    .auth-container {
        width: 100%;
        max-width: 390px;
        padding: 40px 30px;
        background: rgba(16, 19, 23, 0.85);
        border: 1px solid rgba(0, 211, 149, 0.2);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 211, 149, 0.05);
        text-align: center;
        z-index: 10;
        backdrop-filter: blur(15px);
        transition: all 0.5s ease;
    }

    .auth-container h2 {
        margin-bottom: 35px;
        font-size: 36px;
        font-weight: 900;
        color: #00d395;
        letter-spacing: 3px;
        text-shadow: 0 0 15px rgba(0, 211, 149, 0.4);
    }
</style>
<style>
    .input-group {
        margin-bottom: 20px;
        text-align: right;
    }

    .input-group input {
        width: 100%;
        padding: 16px;
        background: #1c2127;
        border: 1px solid #2d343c;
        border-radius: 12px;
        color: white;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
    }

    .input-group input:focus {
        border-color: #00d395;
        background: #1f262e;
        box-shadow: 0 0 12px rgba(0, 211, 149, 0.2);
    }

    .btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        margin-top: 10px;
    }

    .btn-register {
        background-color: #00d395;
        color: #000000;
        box-shadow: 0 4px 20px rgba(0, 211, 149, 0.3);
    }

    .btn-register:hover {
        background-color: #00ffb5;
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(0, 211, 149, 0.5);
    }

    .btn-login {
        background-color: transparent;
        color: #9ca3af;
        border: 1px solid #374151;
        margin-top: 14px;
    }

    .btn-login:hover {
        color: white;
        border-color: #ffffff;
        background: rgba(255, 255, 255, 0.03);
    }
</style>
<style>
    .alert-msg {
        color: #ef4444;
        font-size: 14px;
        margin-top: 15px;
        display: none;
        font-weight: 600;
        padding: 10px;
        background: rgba(239, 68, 68, 0.1);
        border-radius: 8px;
        border: 1px solid rgba(239, 68, 68, 0.15);
        text-align: center;
    }

    .overlay-screen {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000000;
        display: flex; justify-content: center; align-items: center;
        flex-direction: column; z-index: 999;
        opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    .overlay-screen.active { opacity: 1; pointer-events: auto; }

    .loader {
        width: 60px; height: 60px;
        border: 5px solid #1c2127;
        border-top: 5px solid #00d395;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .success-checkmark { display: none; width: 80px; height: 80px; }
    .success-checkmark .check-icon { width: 80px; height: 80px; position: relative; border-radius: 50%; border: 4px solid #00d395; }
    .success-checkmark .check-icon::after { content: ""; position: absolute; top: 18px; left: 32px; width: 15px; height: 30px; border: solid #00d395; border-width: 0 5px 5px 0; transform: rotate(45deg); }

    .vibrate { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
</style>
<style>
    .main-app-interface {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: #000000;
        display: flex; flex-direction: column;
        justify-content: flex-start; align-items: center;
        z-index: 1000; transform: translateY(100%);
        transition: transform 0.6s cubic-bezier(0.1, 1, 0.1, 1);
    }
    .main-app-interface.show { transform: translateY(0); }

    /* الصفحات الفرعية المنفصلة للتحويل الفوري */
    .app-page-view {
        width: 100%;
        max-width: 420px;
        height: calc(100% - 85px);
        overflow-y: auto;
        padding: 25px 15px;
        display: none; /* مخفية افتراضياً */
        flex-direction: column;
        gap: 22px;
        padding-bottom: 50px;
    }
    .app-page-view.active-page {
        display: flex; /* تظهر الصفحة النشطة فقط */
    }
</style>
<style>
    .crypto-package-card {
        width: 100%;
        background: #ffffff;
        border-radius: 20px;
        padding: 18px 22px;
        display: flex;
        direction: ltr; /* اتجاه عالمي ثابت ومطابق لصورك */
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .card-left-section { display: flex; align-items: center; justify-content: center; }
    .discord-badge-icon { width: 65px; height: 65px; fill: #2c2541; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15)); }
    
    .card-center-section { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; margin: 0 15px; }
    .usdt-main-balance { font-size: 32px; font-weight: 900; color: #31a2dc; line-height: 1.1; margin-bottom: 8px; text-align: center; }
    .usdt-sub-rate-box { background: #000000; color: #ffffff; padding: 4px 14px; border-radius: 4px; font-size: 18px; font-weight: 700; text-align: center; }
    
    .card-right-section { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-width: 55px; }
    .fire-badge-icon { width: 38px; height: 38px; fill: #ff3b30; filter: drop-shadow(0 2px 8px rgba(255,59,48,0.3)); }
    .tether-coins-stack { width: 52px; height: auto; }
</style>
<style>
    /* تصميم البطاقة البيضاوية الدائرية بالكامل والمطابقة لصورتك الأخيرة */
    .youtube-task-card {
        width: 100%;
        background: #ffffff;
        border-radius: 50px; /* يجعل الحواف بيضاوية تماماً مثل صورتك */
        padding: 12px 24px;
        display: flex;
        direction: ltr; /* يحاذي التيثر يسار واليوتيوب يمين مثل الصورة */
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .youtube-task-card:hover {
        transform: scale(1.02);
        box-shadow: 0 10px 30px rgba(0, 211, 149, 0.2);
    }

    /* شعار عملات التيثر المتراصة يساراً بالكرت */
    .task-left-coins {
        display: flex;
        align-items: center;
        width: 52px;
        height: auto;
    }

    /* عنوان نصي فخم ومخفي بمنتصف كرت المهمة لمنح مظهر نظيف */
    .task-center-text {
        font-size: 16px;
        font-weight: 700;
        color: #101317;
        letter-spacing: 0.5px;
    }

    /* شعار يوتيوب الفخم والمقوس بالجهة اليمنى */
    .task-right-youtube {
        display: flex;
        align-items: center;
        width: 54px;
        height: 54px;
        fill: #000000; /* لون يوتيوب الداكن المماثل تماماً لكرت صورتك */
        filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
    }
</style>
<style>
    .activate-package-btn {
        width: 100%; padding: 12px; background: #00d395; color: #000000; border: none; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: -12px; margin-bottom: 8px; box-shadow: 0 4px 12px rgba(0, 211, 149, 0.25);
    }
    .activate-package-btn.sent { background: #1c2127 !important; color: #6b7280 !important; box-shadow: none !important; cursor: not-allowed; }

    .payment-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .payment-modal-overlay.open { opacity: 1; pointer-events: auto; }
    .payment-modal-box { width: 90%; max-width: 380px; background: #101317; border: 1px solid #2d343c; border-radius: 20px; padding: 25px; text-align: center; }
    .payment-modal-box h3 { color: #00d395; margin-bottom: 12px; font-size: 20px; }
    .payment-modal-box p { color: #9ca3af; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
    .wallet-address-container { background: #1c2127; border: 1px solid #2d343c; padding: 14px; border-radius: 10px; font-size: 14px; color: #ffffff; word-break: break-all; margin-bottom: 20px; font-weight: bold; }
    .modal-action-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
    .btn-copy-address { background: #00d395; color: #000000; margin-bottom: 12px; }
    .btn-close-modal { background: transparent; color: #9ca3af; border: 1px solid #374151; }

    .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 75px; background-color: #101317; border-top: 1px solid #1c2127; display: flex; direction: ltr; justify-content: space-around; align-items: center; padding-bottom: 10px; }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #9ca3af; font-size: 11px; cursor: pointer; text-decoration: none; width: 20%; transition: all 0.2s ease; }
    .nav-item.active-menu { color: #ffffff !important; }
    .nav-item.active-menu svg { fill: #00d395; }

    .nav-item.trade-center { position: relative; bottom: 12px; background: #101317; width: 54px; height: 54px; border-radius: 50%; justify-content: center; border: 1px solid #1c2127; }
    .nav-item.trade-center svg { stroke: #9ca3af; width: 24px; height: 24px; }
    .nav-item.trade-center span { position: absolute; bottom: -22px; color: #9ca3af; font-weight: bold; }
    .nav-item.trade-center.active-white { background: #ffffff !important; box-shadow: 0 4px 20px rgba(255, 255, 255, 0.4); border-color: #ffffff; }
    .nav-item.trade-center.active-white svg { stroke: #000000 !important; }
    .nav-item.trade-center.active-white span { color: #ffffff !important; }
    .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: currentColor; }
</style>
</head>

        <script>
        let currentActivePkgId = null;

        function showLoginError() {
            const alertBox = document.getElementById('loginAlert');
            alertBox.innerText = "عذراً ليس لديك حساب مسبقاً"; alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
        }

        function triggerRegistration() {
            const user = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const alertBox = document.getElementById('loginAlert');

            if (user === "" || email === "" || pass === "") {
                alertBox.innerText = "يرجى إكمال معلومات الحساب أولاً!"; alertBox.style.display = 'block';
                setTimeout(() => { alertBox.style.display = 'none'; }, 4000); return;
            }

            const overlay = document.getElementById('overlayScreen');
            const loader = document.getElementById('mainLoader');
            const successCheck = document.getElementById('successCheck');
            const mainApp = document.getElementById('mainApp');
            const bodyElement = document.body;

            overlay.classList.add('active'); loader.style.display = 'block'; successCheck.style.display = 'none';

            setTimeout(() => {
                loader.style.display = 'none'; successCheck.style.display = 'block'; bodyElement.classList.add('vibrate');
                if (navigator.vibrate) { navigator.vibrate(200); }
                setTimeout(() => { bodyElement.classList.remove('vibrate'); }, 400);
                setTimeout(() => { overlay.classList.remove('active'); mainApp.classList.add('show'); }, 1200);
            }, 2000);
        }

        // دالة التحويل الفوري التفاعلي بين الصفحات
        function switchPage(pageId) {
            // إخفاء جميع الصفحات أولاً
            document.getElementById('page-trade').classList.remove('active-page');
            document.getElementById('page-home').classList.remove('active-page');
            document.getElementById('nav-home-btn').classList.remove('active-menu');
            document.getElementById('targetTradeBtn').classList.remove('active-white');

            // إظهار الصفحة المستهدفة وتحديث مؤشر الشريط السفلي
            if (pageId === 'trade') {
                document.getElementById('page-trade').classList.add('active-page');
                document.getElementById('targetTradeBtn').classList.add('active-white');
            } else if (pageId === 'home') {
                document.getElementById('page-home').classList.add('active-page');
                document.getElementById('nav-home-btn').classList.add('active-menu');
            } else {
                // الصفحات الأخرى المتبقية تعود لـ Home بشكل تلقائي لحين برمجتها
                document.getElementById('page-home').classList.add('active-page');
                document.getElementById('nav-home-btn').classList.add('active-menu');

        }

        function openPaymentModal(packageName, amount, pkgId) {
            currentActivePkgId = pkgId;
            document.getElementById('modalPackageName').innerText = "تفعيل الباقة " + packageName + " (" + amount + " USDT)";
            document.getElementById('paymentModal').classList.add('open');

        function closePaymentModal() { document.getElementById('paymentModal').classList.remove('open'); currentActivePkgId = null; }

        function copyWalletAddressAndConfirm() {
            const addressText = document.getElementById('walletAddr').innerText;
            navigator.clipboard.writeText(addressText).then(() => { executeConfirmationFlow(); })
            .catch(err => {
                const el = document.createElement('textarea'); el.value = addressText; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); executeConfirmationFlow();
            });
        }

        function executeConfirmationFlow() {
            if (currentActivePkgId) {
                const targetBtn = document.getElementById('pkg-btn-' + currentActivePkgId);
                if (targetBtn) { targetBtn.innerText = "تم الإرسال"; targetBtn.classList.add('sent'); targetBtn.onclick = null; }

            alert("تم نسخ عنوان محفظة TRC20 بنجاح، يرجى إتمام عملية التحويل الآن.");
            closePaymentModal();

                tasksHTML += `

                        <!-- شعار يوتيوب الداكن المقتبس من صورتك تماماً يميناً بالكرت -->
                        <div class="task-right-youtube">
                            <svg viewBox="0 0 24 24">
                                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                            </svg>
                        </div>
                    </div>
                `;
            }
            homePageContainer.innerHTML = tasksHTML;
        }

        // محرك خلفية جزيئات النيون المشعة لـ OKX العالمية
        const canvas = document.getElementById('okxParticleCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class OKXParticle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 1; this.speedX = Math.random() * 0.4 - 0.2; this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 211, 149, 0.45)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = []; let numberOfParticles = (canvas.width * canvas.height) / 11000;
            for (let i = 0; i < numberOfParticles; i++) { particlesArray.push(new OKXParticle()); }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); }
            requestAnimationFrame(animateParticles);
        }

        // تشغيل الدوال عند الإقلاع الفوري للموقع
        generateYouTubeTasks();
        initParticles();
        animateParticles();
    </script>
