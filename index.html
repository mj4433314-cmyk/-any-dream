<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>HR</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

html,
body{
width:100%;
height:100%;
overflow-x:hidden;
}

body{

display:flex;

justify-content:center;

align-items:center;

padding:18px;

background:linear-gradient(135deg,#0a48c9,#2196f3);

}

.card{

width:100%;

max-width:390px;

background:#fff;

border-radius:24px;

padding:24px;

box-shadow:0 15px 40px rgba(0,0,0,.18);

}

.logo{

width:90px;

height:90px;

margin:auto;

border-radius:50%;

background:linear-gradient(135deg,#00b0ff,#1565ff);

display:flex;

justify-content:center;

align-items:center;

font-size:42px;

font-weight:800;

color:#fff;

}

.title{

text-align:center;

font-size:30px;

font-weight:800;

color:#1565ff;

margin-top:15px;

}

.sub{

text-align:center;

color:#777;

margin-top:8px;

margin-bottom:20px;

}
  .input,
select{
width:100%;
height:56px;
border:2px solid #e7ecf7;
border-radius:16px;
padding:0 16px;
font-size:17px;
margin-top:14px;
outline:none;
background:#fff;
transition:.3s;
}

.input:focus,
select:focus{
border-color:#1565ff;
box-shadow:0 0 12px rgba(21,101,255,.15);
}

.captcha-box{
display:flex;
gap:10px;
margin-top:14px;
}

.captcha{
flex:1;
height:56px;
border-radius:16px;
background:#eef5ff;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:800;
letter-spacing:5px;
color:#1565ff;
}

.reload{
width:60px;
border:none;
border-radius:16px;
background:#1565ff;
color:#fff;
font-size:24px;
cursor:pointer;
}

.btn{
width:100%;
height:58px;
border:none;
border-radius:16px;
margin-top:18px;
background:#1565ff;
color:#fff;
font-size:20px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.btn:active{
transform:scale(.98);
}

.link{
text-align:center;
margin-top:16px;
font-size:16px;
}

.link a{
color:#1565ff;
font-weight:bold;
text-decoration:none;
  }
  .loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,.96);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.spinner{
width:80px;
height:80px;
border:6px solid #dbe7ff;
border-top:6px solid #1565ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.success{
width:90px;
height:90px;
background:#10b981;
border-radius:50%;
display:none;
justify-content:center;
align-items:center;
font-size:48px;
color:#fff;
margin-top:20px;
}

.message{
margin-top:15px;
text-align:center;
color:#e53935;
font-weight:bold;
min-height:22px;
}

@media(max-width:480px){

.card{
padding:20px;
border-radius:20px;
}

.logo{
width:80px;
height:80px;
font-size:36px;
}

.title{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="logo">HR</div>

<div class="title">HR</div>

<div class="sub">مرحباً بك</div>
<select>
<option>🇮🇶 العراق +964</option>
<option>🇸🇦 السعودية +966</option>
<option>🇦🇪 الإمارات +971</option>
<option>🇯🇴 الأردن +962</option>
<option>🇪🇬 مصر +20</option>
<option>🇹🇷 تركيا +90</option>
<option>🇺🇸 الولايات المتحدة +1</option>
</select>

<input class="input" type="tel" placeholder="رقم الهاتف">

<input class="input" type="password" placeholder="كلمة المرور">

<input class="input" type="text" placeholder="رمز الدعوة">

<div class="captcha-box">

<div class="captcha" id="captcha">
A7K9
</div>

<button class="reload" onclick="refreshCaptcha()">
↻
</button>

</div>

<input class="input"
id="captchaInput"
placeholder="اكتب رمز التحقق">

<div id="message" class="message"></div>

<button class="btn"
onclick="login()">
تسجيل الدخول
</button>

<button class="btn"
style="background:#10b981;margin-top:12px;"
onclick="register()">
إنشاء حساب جديد
</button>
<div class="link">
ليس لديك حساب؟
<a href="#">سجل الآن</a>
</div>

</div>

<div class="loading" id="loading">

<div class="spinner"></div>

<div style="margin-top:20px;font-size:20px;font-weight:bold;color:#1565ff;">
جاري إنشاء الحساب...
</div>

<div class="success" id="success">
✓
</div>

</div>

<script>

let captcha="";

function refreshCaptcha(){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

captcha="";

for(let i=0;i<4;i++){

captcha+=chars[Math.floor(Math.random()*chars.length)];

}

document.getElementById("captcha").innerHTML=captcha;

}

refreshCaptcha();
  function login(){

const msg=document.getElementById("message");

msg.style.color="#e53935";

msg.innerHTML="عذراً، ليس لديك حساب مسبق";

setTimeout(function(){

msg.innerHTML="";

},3000);

}

function register(){

const input=document.getElementById("captchaInput").value.trim().toUpperCase();

if(input!==captcha){

const msg=document.getElementById("message");

msg.style.color="#e53935";

msg.innerHTML="رمز التحقق غير صحيح";

refreshCaptcha();

return;

}

document.getElementById("loading").style.display="flex";

if(navigator.vibrate){

navigator.vibrate([120,80,120]);

}

setTimeout(function(){

document.querySelector(".spinner").style.display="none";

document.getElementById("success").style.display="flex";

},10000);

}

</script>

</body>

</html>
