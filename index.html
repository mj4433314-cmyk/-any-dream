<div id="msg" style="
display:none;
background:#ff4d4f;
color:white;
padding:12px;
border-radius:10px;
text-align:center;
margin-bottom:15px;">
عذراً، ليس لديك حساب مسبق.
</div>

<button onclick="login()">تسجيل الدخول</button>

<script>
function login(){
    let msg=document.getElementById("msg");
    msg.style.display="block";

    setTimeout(function(){
        msg.style.display="none";
    },2500);
}
</script>
