<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KXTRM - Watch and Earn</title>
    <style>
        /* تعيين الخلفية البنفسجية الكاملة للموقع وتنسيق الشاشة */
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #5d25cc; /* اللون البنفسجي المعتمد */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        /* تصميم البطاقة الزجاجية الداكنة في المنتصف */
        .main-card {
            background: rgba(20, 15, 35, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        /* تنسيق وحجم الشعار الشفاف */
        .logo-container .site-logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 25px;
            display: inline-block;
        }

        /* تنسيق رابط الموقع الأبيض المحدد بالأسود */
        .url-text {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-bottom: 15px;
            word-break: break-all;
        }

        /* تنسيق النص الوصفي */
        .sub-text {
            font-size: 14px;
            color: #cccccc;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* تصميم الزر الأخضر المشع والمميز */
        .green-btn {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(90deg, #00b894, #00ecb9);
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            padding: 14px 35px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 184, 148, 0.5);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* تأثير التمرير الفأري فوق الزر لزيادة التوهج */
        .green-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 236, 185, 0.8);
            background: linear-gradient(90deg, #00ecb9, #00b894);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- قسم الشعار الشفاف الخاص بك -->
        <div class="logo-container">
            <img src="logo.png" alt="KXTRM Logo" class="site-logo">
        </div>
        
        <!-- رابط الموقع الخاص بك -->
        <div class="url-text">
            https://workers.dev
        </div>
        
        <!-- النص الوصفي بالإنجليزية المعتمد في التصميم -->
        <p class="sub-text">
            Start your journey to earning USD effortlessly. Watch. Earn. Repeat.
        </p>
        
        <!-- الزر الأخضر التفاعلي الجديد -->
        <a href="#" id="earnBtn" class="green-btn">WATCH AND EARN USD</a>
</div>

<!-- نافذة تسجيل الدخول المنبثقة -->
<div id="loginOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 9999; justify-content: center; align-items: center; direction: rtl;">
    <div style="background: #ffffff; color: #333; padding: 30px 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 5px 25px rgba(0,0,0,0.3); font-family: sans-serif;">
        <h3 style="margin-top: 0; margin-bottom: 20px; color: #5d25cd;">تسجيل الدخول للمتابعة</h3>
        <input type="text" placeholder="اسم المستخدم أو البريد" style="width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px;">
        <input type="password" placeholder="كلمة المرور" style="width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px;">
        <button onclick="submitLogin()" style="background: #5d25cd; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 15px;">تسجيل الدخول</button>
    </div>
</div>

<script>
    // فتح القائمة عند الضغط على الزر الأخضر
    document.getElementById('earnBtn').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('loginOverlay').style.display = 'flex';
    });

    // إغلاق القائمة عند الضغط في الخلفية السوداء الفارغة
    document.getElementById('loginOverlay').addEventListener('click', function(e) {
        if(e.target === this) {
            this.style.display = 'none';
        }
    });

    // وظيفة زر تسجيل الدخول
    function submitLogin() {
        alert('تم تسجيل الدخول بنجاح!');
        document.getElementById('loginOverlay').style.display = 'none';
    }
</script>

</body>
</html>
