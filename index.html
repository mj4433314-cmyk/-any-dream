<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR - تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{
background:linear-gradient(135deg,#0a1f44,#123b8a);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}
.box{
width:380px;
background:#fff;
border-radius:18px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}
.logo{
text-align:center;
font-size:48px;
font-weight:700;
color:#1d4ed8;
margin-bottom:8px;
}
.title{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}
input{
width:100%;
padding:14px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}
.captcha{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}
.code{
padding:10px 18px;
background:#eef4ff;
border-radius:8px;
font-weight:bold;
font-size:22px;
letter-spacing:3px;
}
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:8px;
}
.login{
background:#2563eb;
color:#fff;
}
.register{
background:#10b981;
color:#fff;
}
#msg{
display:none;
background:#ef4444;
color:#fff;
padding:12px;
border-radius:10px;
text-align:center;
margin-bottom:12px;
}
</style>
</head>

<body>

<div class="box">

<div class="logo">HR</div>
<div class="title">تسجيل الدخول</div>

<div id="msg">عذراً، ليس لديك حساب مسبق.</div>

<input type="text" placeholder="رقم الهاتف">
<input type="password" placeholder="كلمة المرور">
<input type="text" placeholder="رمز الدعوة">

<div class="captcha">
<div class="code" id="cap"></div>
<button type="button" onclick="newCode()" style="width:auto;padding:10px 15px;">تغيير</button>
</div>

<input type="text" placeholder="أدخل رمز التحقق">

<button class="login" onclick="login()">تسجيل الدخول</button>
<button class="register">إنشاء حساب جديد</button>

</div>

<script>
function randomCode(){
const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
let c="";
for(let i=0;i<4;i++){
c+=chars[Math.floor(Math.random()*chars.length)];
}
return c;
}

function newCode(){
document.getElementById("cap").innerHTML=randomCode();
}

newCode();

function login(){
let msg=document.getElementById("msg");
msg.style.display="block";
setTimeout(()=>{
msg.style.display="none";
},2500);
}
</script>

</body>
</html>
