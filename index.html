<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
max-width:500px;
width:100%;
text-align:center;
}

.logo{
font-size:42px;
font-weight:900;
color:#b8ff1a;
margin-bottom:20px;
}

.welcome{
font-size:30px;
font-weight:900;
line-height:1.8;
margin-bottom:25px;
}

.desc{
font-size:18px;
line-height:2;
color:#ddd;
margin-bottom:30px;
}

.btn{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:900;
cursor:pointer;
background:#b8ff1a;
color:#000;
}

.btn:hover{
opacity:.9;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">NOVA</div>

<div class="welcome">
WELCOME TO NOVA PLATFORM
</div>

<div class="desc">
Welcome to Nova Platform.<br>
We provide comprehensive support for our users.<br><br>

Watch approved video content and complete available tasks through the platform.<br><br>

Invite your friends and receive referral rewards according to the platform rules.
</div>

<button class="btn" onclick="register()">
إنشاء حساب
</button>

<button class="btn" onclick="login()">
تسجيل الدخول
</button>

</div>

<script>
function login(){
alert("عذراً، ليس لديك حساب مسبقاً.");
}

function register(){
alert("تم إنشاء الحساب بنجاح، مرحباً بك في منصة NOVA.");
}
</script>

</body>
</html>
