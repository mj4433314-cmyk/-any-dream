<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل المستخدم</title>
    <!-- استدعاء مكتبات Firebase الأساسية -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #f9f9f9; }
        .phone-group { display: flex; gap: 10px; }
        .phone-group select { width: 30%; }
        .phone-group input { width: 70%; }
        .captcha-group { display: flex; gap: 10px; align-items: center; }
        .captcha-box { background: #e0e0e0; padding: 10px; border-radius: 5px; font-weight: bold; letter-spacing: 2px; color: #555; }
        .btn-submit { width: 100%; padding: 14px; background-color: #2196F3; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .agreement { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #777; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>تسجيل المستخدم</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>رقم التليفون</label>
                <div class="phone-group">
                    <select id="countryCode"><option value="+964">+964</option><option value="+966">+966</option></select>
                    <input type="text" id="phoneNumber" placeholder="رقم الهاتف بدون (0)" required>
                </div>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة السر" required>
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <input type="password" id="confirmPassword" placeholder="الرجاء تأكيد كلمة المرور" required>
            </div>
            <div class="form-group">
                <label>الكابتشا الرسومية</label>
                <div class="captcha-group">
                    <input type="text" id="captchaInput" placeholder="لـ رمز التحقق من الرسم" required>
                    <div class="captcha-box">pveo</div>
                </div>
            </div>
            <div class="form-group">
                <label>رمز الدعوة</label>
                <input type="text" id="inviteCode" placeholder="أدخل رمز الدعوة">
            </div>
            <div class="agreement">
                <input type="checkbox" id="agree" checked required>
                <label for="agree">لقد قرأت وأوافق على اتفاقية المستخدم</label>
            </div>
            <button type="submit" class="btn-submit">تسجيل</button>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC8Bb6zxv8gxjUVb2kyKMpq7Wf_O6oDEX0",
            databaseURL: "https://firebaseio.com",
            projectId: "nova-17247"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const fullPhone = document.getElementById('countryCode').value + document.getElementById('phoneNumber').value;
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const captcha = document.getElementById('captchaInput').value;
            const invite = document.getElementById('inviteCode').value;

            if (pass !== confirmPass) { alert("كلمات المرور غير متطابقة!"); return; }
            if (captcha !== "pveo") { alert("رمز الكابتشا غير صحيح!"); return; }

            const userRef = database.ref('users/' + document.getElementById('phoneNumber').value);
            userRef.set({
                phone: fullPhone,
                password: pass,
                referral_code: invite
            }, function(error) {
                if (error) { alert("حدث خطأ أثناء حفظ البيانات: " + error.message); } 
                else { alert("تم التسجيل بنجاح في قاعدة البيانات!"); window.location.href = 'profile.html'; }
            });
        });
    </script>
</body>
</html>
