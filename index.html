<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة HR الفخمة</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background: radial-gradient(circle at center, #0c0817 0%, #030206 100%);
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }

    /* واجهة التسجيل الفخمة */
    .auth-container {
        width: 100%;
        max-width: 400px;
        padding: 35px 30px;
        background: rgba(17, 14, 26, 0.95);
        border: 1px solid rgba(139, 92, 246, 0.15);
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(139, 92, 246, 0.05);
        text-align: center;
        backdrop-filter: blur(10px);
    }

    /* كتابة HR الفخمة */
    .auth-container h2 {
        margin-bottom: 30px;
        font-size: 32px;
        font-weight: 800;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #ffffff 0%, #a78bfa 50%, #6366f1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .input-group {
        margin-bottom: 18px;
        text-align: right;
    }

    .input-group input {
        width: 100%;
        padding: 15px;
        background: #14111f;
        border: 1px solid #28223d;
        border-radius: 10px;
        color: white;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
    }

    .input-group input:focus {
        border-color: #8b5cf6;
        background: #1a162b;
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.25);
    }

    .btn {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
    }

    .btn-register {
        background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
        color: #ffffff;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(139, 92, 246, 0.6);
    }

    .btn-login {
        background-color: transparent;
        color: #9d96b8;
        border: 1px solid #2d2645;
        margin-top: 12px;
    }

    .btn-login:hover {
        color: white;
        border-color: #8b5cf6;
        background: rgba(139, 92, 246, 0.05);
    }

    .alert-msg {
        color: #ff4a6b;
        font-size: 14px;
        margin-top: 12px;
        display: none;
        font-weight: 600;
        padding: 8px;
        background: rgba(255, 74, 107, 0.1);
        border-radius: 6px;
    }
</style>
<style>
    .overlay-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #030206;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
    }

    .overlay-screen.active {
        opacity: 1;
        pointer-events: auto;
    }

    .loader {
        width: 60px;
        height: 60px;
        border: 5px solid #14111f;
        border-top: 5px solid #8b5cf6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .success-checkmark {
        display: none;
        width: 80px;
        height: 80px;
        position: relative;
    }

    .success-checkmark .check-icon {
        width: 80px;
        height: 80px;
        position: relative;
        border-radius: 50%;
        box-sizing: content-box;
        border: 4px solid #8b5cf6;
    }

    .success-checkmark .check-icon::after {
        content: "";
        position: absolute;
        top: 18px;
        left: 32px;
        width: 15px;
        height: 30px;
        border: solid #8b5cf6;
        border-width: 0 5px 5px 0;
        transform: rotate(45deg);
    }

    .vibrate {
        animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
        10%, 90% { transform: translate3d(-2px, 0, 0); }
        20%, 80% { transform: translate3d(4px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
        40%, 60% { transform: translate3d(6px, 0, 0); }
    }

    .main-app-interface {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #030206;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transform: translateY(100%);
        transition: transform 0.6s cubic-bezier(0.1, 1, 0.1, 1);
    }

    .main-app-interface.show {
        transform: translateY(0);
    }

    .app-center-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .brand-logo {
        width: 220px;
        height: 220px;
        filter: drop-shadow(0 0 25px rgba(139, 92, 246, 0.2));
    }

    .bottom-nav {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 75px;
        background-color: #0c0817;
        border-top: 1px solid #1a152e;
        display: flex;
        direction: ltr;
        justify-content: space-around;
        align-items: center;
        padding-bottom: 10px;
    }

    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #797193;
        font-size: 11px;
        cursor: pointer;
        text-decoration: none;
        width: 20%;
    }

    .nav-item.active {
        color: #ffffff;
    }

    .nav-item.trade-center {
        position: relative;
        bottom: 14px;
        background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
        width: 54px;
        height: 54px;
        border-radius: 50%;
        justify-content: center;
        box-shadow: 0 4px 25px rgba(139, 92, 246, 0.5);
    }

    .nav-item.trade-center svg {
        stroke: #ffffff;
        width: 24px;
        height: 24px;
        margin-bottom: 0;
    }
    
    .nav-item.trade-center span {
        position: absolute;
        bottom: -22px;
        color: #ffffff;
        font-weight: bold;
        font-size: 11px;
        white-space: nowrap;
    }

    .nav-item svg {
        width: 22px;
        height: 22px;
        margin-bottom: 4px;
        fill: currentColor;
    }
</style>
<body>
    <!-- واجهة تسجيل الحساب -->
    <div class="auth-container" id="authBox">
        <h2>HR</h2>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="اسم المستخدم">
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="البريد الإلكتروني">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="كلمة السر">
        </div>
        <div class="input-group">
            <input type="text" id="inviteCode" placeholder="رمز الدعوة (اختياري)">
        </div>

        <button class="btn btn-register" onclick="triggerRegistration()">إنشاء حساب</button>
        <button class="btn btn-login" onclick="showLoginError()">تسجيل الدخول</button>
        
        <div class="alert-msg" id="loginAlert">عذراً ليس لديك حساب مسبقاً</div>
    </div>

    <!-- شاشة اللودينج وعلامة النجاح -->
    <div class="overlay-screen" id="overlayScreen">
        <div class="loader" id="mainLoader"></div>
        <div class="success-checkmark" id="successCheck">
            <div class="check-icon"></div>
        </div>
    </div>
        <!-- واجهة التطبيق التي تظهر بعد النجاح -->
    <div class="main-app-interface" id="mainApp">
        <div class="app-center-logo">
            <!-- الشعار السداسي الفخم المستوحى من صورتك بدقة SVG عالية -->
            <svg class="brand-logo" viewBox="0 0 200 200">
                <defs>
                    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#cc66ff" />
                        <stop offset="50%" stop-color="#8b5cf6" />
                        <stop offset="100%" stop-color="#3b0066" />
                    </linearGradient>
                    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffffff" />
                        <stop offset="30%" stop-color="#8a8a8a" />
                        <stop offset="70%" stop-color="#3a3a3a" />
                        <stop offset="100%" stop-color="#6e6e6e" />
                    </linearGradient>
                </defs>
                
                <!-- الإطار السداسي الخارجي والداخلي الداكن -->
                <polygon points="100,20 165,57.5 165,132.5 100,170 35,132.5 35,57.5" fill="#0d0c12" stroke="url(#hexGrad)" stroke-width="6" />
                <polygon points="97,26 158,61 158,129 97,164 36,129 36,61" fill="#08070d" />
                
                <!-- تصميم حرف S المتدرج والقاطع -->
                <path d="M135,70 L80,70 L70,85 L120,85 L135,100 L75,140 L125,140 L135,125 L90,125 L75,110 L135,70 Z" fill="url(#sGrad)" />
                
                <!-- الخط الفضي المعدني الفاصل بمنتصف الحرف -->
                <polygon points="60,103 115,103 105,108 50,108" fill="#e0e0e0" />
            </svg>
        </div>

        <!-- شريط التنقل السفلي الموزع عالمياً من اليسار لليمين -->
        <div class="bottom-nav">
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2z"/></svg>
                <span>Portfolio</span>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 14h-2v-2h2zm0-4h-2V7h2z"/></svg>
                <span>Earn</span>
            </div>
            <div class="nav-item trade-center active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12M17 20l4-4M17 20l-4-4"/></svg>
                <span>Trade</span>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M20 18.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM17 12v1a4 4 0 0 0 4 4h1v-2h-1a2 2 0 0 1-2-2v-1h-2zM5 21a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1H5z"/></svg>
                <span>Square</span>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M4 20h3V10H4v10zm6 0h3V4h-3v16zm6 0h3v-7h-3v7z"/></svg>
                <span>Home</span>
            </div>
        </div>
    </div>
        <script>
        function showLoginError() {
            const alertBox = document.getElementById('loginAlert');
            alertBox.style.background = "rgba(255, 74, 107, 0.1)";
            alertBox.style.color = "#ff4a6b";
            alertBox.innerText = "عذراً ليس لديك حساب مسبقاً";
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
        }

        // الوظيفة الذكية للتحقق من الحقول قبل بدء الحركات
        function triggerRegistration() {
            const user = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const alertBox = document.getElementById('loginAlert');

            // التحقق البرمجي: يمنع الاستمرار ويطلب تعبئة الحقول
            if (user === "" || email === "" || pass === "") {
                alertBox.style.background = "rgba(255, 74, 107, 0.15)";
                alertBox.style.color = "#ff4a6b";
                alertBox.innerText = "يرجى إكمال معلومات الحساب أولاً!";
                alertBox.style.display = 'block';
                setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
                return; // إيقاف العملية
            }

            // تنفيذ الحركات في حال اكتمال البيانات
            const overlay = document.getElementById('overlayScreen');
            const loader = document.getElementById('mainLoader');
            const successCheck = document.getElementById('successCheck');
            const mainApp = document.getElementById('mainApp');
            const bodyElement = document.body;

            overlay.classList.add('active');
            loader.style.display = 'block';
            successCheck.style.display = 'none';

            setTimeout(() => {
                loader.style.display = 'none';
                successCheck.style.display = 'block';
                bodyElement.classList.add('vibrate');
                
                if (navigator.vibrate) { navigator.vibrate(200); }

                setTimeout(() => { bodyElement.classList.remove('vibrate'); }, 400);

                setTimeout(() => {
                    overlay.classList.remove('active');
                    mainApp.classList.add('show');
                }, 1200);
            }, 2000);
        }
    </script>
</body>
</html>
