<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحة المهام</title>
  <!-- استدعاء أيقونات FontAwesome لتطابق شريط التنقل السفلي -->
  <link rel="stylesheet" href="https://cloudflare.com">
  <style>
    body {
      background-color: #0b0e14; /* لون الخلفية الداكن المطابق لموقعك */
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px 20px 80px 20px; /* مسافة علوية بسيطة ومسافة سفلية لشريط التنقل */
    }

    /* حاوي المهام كأزرار أو بنرات قابلة للنقر */
    .task-container {
      width: 100%;
      margin-bottom: 5px; /* تم تقليل المسافة هنا لتصبح الصور متقاربة */
      cursor: pointer;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .task-container:active {
      transform: scale(0.98); /* تأثير بسيط عند الضغط بالهاتف */
    }

    .task-image {
      width: 100%;
      display: block;
    }

    /* تنسيق شريط التنقل السفلي الاحترافي لبايننس */
    .binance-bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #181a20;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid #2b2f36;
      z-index: 1000;
      box-sizing: border-box;
    }

    .binance-bottom-nav a {
      text-decoration: none;
      color: #848e9c;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 12px;
      width: 25%;
    }

    .binance-bottom-nav a i {
      font-size: 20px;
      margin-bottom: 4px;
    }

    /* تمييز زر المهام باللون الأصفر لأنه الصفحة النشطة حالياً */
    .binance-bottom-nav a.active {
      color: #f0b90b;
    }
  </style>
</head>
<body>

  <!-- عرض الصور الأربعة الشفافة للمهام مع رسالة التنبيه عند النقر ومسافات متقاربة -->
  <div class="task-container" onclick="showTaskAlert()">
    <img src="task1.png" alt="Task 1" class="task-image">
  </div>

  <div class="task-container" onclick="showTaskAlert()">
    <img src="task2.png" alt="Task 2" class="task-image">
  </div>

  <div class="task-container" onclick="showTaskAlert()">
    <img src="task3.png" alt="Task 3" class="task-image">
  </div>

  <div class="task-container" onclick="showTaskAlert()">
    <img src="task4.png" alt="Task 4" class="task-image">
  </div>


  <!-- شريط التنقل السفلي الثابت للاتصال بالصفحات الأخرى -->
  <div class="binance-bottom-nav">
    <a href="account.html">
      <i class="fas fa-user"></i>
      <span>حسابي</span>
    </a>
    <a href="tasks.html" class="active">
      <i class="fas fa-list-ul"></i>
      <span>المهام</span>
    </a>
    <a href="assets.html">
      <i class="fas fa-wallet"></i>
      <span>الأصول</span>
    </a>
    <a href="home.html">
      <i class="fas fa-home"></i>
      <span>الرئيسية</span>
    </a>
  </div>

  <!-- كود الجافاسكربت الخاص بإظهار الرسالة للمستخدم -->
  <script>
    function showTaskAlert() {
      alert("يرجى الاشتراك لتفعيل المهمات");
    }
  </script>

</body>
</html>
<!-- شريط التنقل السفلي الاحترافي - صفحة المهام -->
<nav class="tab-bar">
  <ul class="tab-bar__tabs">
    
    <!-- 1. واجهة الحساب -->
    <li class="tab-bar__tab">
      <a class="tab-bar__tab-link" href="index.html">
        <svg class="tab-bar__tab-icon" viewBox="0 0 24 24" width="24px" height="24px">
          <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M4 20c0-4 4-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
        <span class="tab-bar__tab-text">الحساب</span>
      </a>
    </li>

    <!-- 2. الشعار / الرئيسية -->
    <li class="tab-bar__tab">
      <a class="tab-bar__tab-link" href="home.html">
        <img src="lokgo.png" alt="Logo" class="tab-bar__logo">
        <span class="tab-bar__tab-text">الرئيسية</span>
      </a>
    </li>

    <!-- 3. قائمة الأصول -->
    <li class="tab-bar__tab">
      <a class="tab-bar__tab-link" href="assets.html">
        <svg class="tab-bar__tab-icon" viewBox="0 0 24 24" width="24px" height="24px">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
        <span class="tab-bar__tab-text">الأصول</span>
      </a>
    </li>

    <!-- 4. قائمة المهام (نشطة في هذه الصفحة) -->
    <li class="tab-bar__tab">
      <a class="tab-bar__tab-link" href="tasks.html" aria-current="page">
        <svg class="tab-bar__tab-icon" viewBox="0 0 24 24" width="24px" height="24px">
          <path d="M3 3v18h18" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
        <span class="tab-bar__tab-text">المهام</span>
      </a>
    </li>

  </ul>
</nav>

<style>
:root {
  --bg-nav: #1e222b;
  --text-active: #3b82f6;
  --text-inactive: #9ca3af;
}

.tab-bar {
  position: fixed;
  bottom: 15px;
  left: 5%;
  width: 90%;
  background-color: var(--bg-nav);
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
  z-index: 9999;
  padding: 10px 0;
  direction: rtl;
}

.tab-bar__tabs {
  display: flex;
  justify-content: space-around;
  list-style: none;
  margin: 0;
  padding: 0;
}

.tab-bar__tab {
  flex: 1;
  text-align: center;
}

.tab-bar__tab-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: var(--text-inactive);
  transition: color 0.3s ease;
}

.tab-bar__tab-link[aria-current="page"],
.tab-bar__tab-link:hover {
  color: var(--text-active);
}

.tab-bar__tab-link[aria-current="page"] svg {
  fill: currentColor;
}

.tab-bar__tab-icon {
  transition: transform 0.3s ease, fill 0.3s ease;
}

.tab-bar__tab-link:active .tab-bar__tab-icon {
  transform: scale(0.85);
}

.tab-bar__tab-text {
  font-size: 11px;
  margin-top: 4px;
}

.tab-bar__logo {
  width: 24px;
  height: 24px;
  object-fit: contain;
}
</style>
