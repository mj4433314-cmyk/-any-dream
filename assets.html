<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الباقات - الأصول</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            padding: 20px;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 90px;
        }

        .pkg-container {
            max-width: 450px;
            margin: auto;
            text-align: center;
        }

        /* جعل مربع الباقة مرناً لكي لا يضغط الصورة */
        .pkg-card {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            background-color: #111522;
        }

        /* ضبط الصورة لتعرض مقاسها الحقيقي الطبيعي دون تمدد */
        .pkg-card img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* تنسيق شريط التنقل السفلي الكلاسيكي */
        .binance-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #111522;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #22293f;
            z-index: 9999;
            direction: rtl;
        }

        .binance-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #848e9c;
            font-size: 12px;
            flex: 1;
        }

        .binance-nav-item.active {
            color: #f0b90b;
        }

        .binance-nav-item i {
            font-size: 18px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="pkg-container">
        <h2 style="font-family: 'Cairo', sans-serif; color: #f0b90b; margin-bottom: 20px;">الباقات الاستثمارية</h2>
        
        <!-- كروت الباقات الخمسة بأبعاد طبيعية معتدلة -->
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg1.jpg" alt="الباقة الأولى">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg2.jpg" alt="الباقة الثانية">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg3.jpg" alt="الباقة الثالثة">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg4.jpg" alt="الباقة الرابعة">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg5.jpg" alt="الباقة الخامسة">
        </div>
    </div>

    <!-- النافذة المنبثقة الاحترافية الجديدة لرسالة عذراً رصيدك غير كافي -->
    <div id="pkgModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center;">
        <div style="background: #182030; padding: 30px 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 5px 25px rgba(0,0,0,0.5); border: 1px solid #ff4a5a;">
            <!-- علامة التحذير الاحترافية الملونة -->
            <div style="font-size: 45px; margin-bottom: 15px; color: #ff4a5a;">⚠️</div>
            <h3 style="margin-top: 0; color: #ff4a5a; font-family: 'Cairo', sans-serif; font-size: 20px;">عذراً، رصيدك غير كافي!</h3>
            <p style="font-size: 14px; color: #a0a5b5; margin-bottom: 25px; line-height: 1.6;">يرجى شحن حسابك أولاً لتتمكن من تفعيل وتشغيل هذه الباقة الاستثمارية.</p>
            <div style="display: flex; justify-content: center;">
                <button onclick="closePackageModal()" style="width: 100%; padding: 12px; border-radius: 8px; border: none; background: #ff4a5a; color: white; font-weight: bold; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 15px; box-shadow: 0 4px 10px rgba(255, 74, 90, 0.3);">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- شريط التنقل الكلاسيكي الموحد -->
    <div class="binance-bottom-nav">
        <a href="index.html" class="binance-nav-item">
            <i class="fas fa-user"></i>
            <span>حسابي</span>
        </a>
        <a href="tasks.html" class="binance-nav-item">
            <i class="fas fa-list-ul"></i>
            <span>المهام</span>
        </a>
        <a href="assets.html" class="binance-nav-item active">
            <i class="fas fa-wallet"></i>
            <span>الأصول</span>
        </a>
        <a href="home.html" class="binance-nav-item">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
    </div>

    <script>
        function openPkgModal() {
            document.getElementById('pkgModal').style.display = 'flex';
        }
        function closePackageModal() {
            document.getElementById('pkgModal').style.display = 'none';
        }
    </script>
</body>
</html>
