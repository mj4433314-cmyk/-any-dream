<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الباقات - الأصول</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            padding: 20px;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 90px;
        }

        .pkg-container {
            max-width: 450px;
            margin: auto;
            text-align: center;
        }

        /* ضبط مربعات الباقات لتصبح متساوية 100% */
        .pkg-card {
            width: 100%;
            height: 160px; /* طول موحد لكل الكروت */
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            background-color: #111522;
        }

        /* ضبط الصور لتملأ المربع وتتناسق تلقائياً دون تمدد مكسور */
        .pkg-card img {
            width: 100%;
            height: 100%;
            object-fit: fill; /* تجعل الصورة تأخذ الحجم الكامل بالتساوي */
            display: block;
        }

        /* تنسيق شريط التنقل السفلي الكلاسيكي */
        .binance-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #111522;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #22293f;
            z-index: 9999;
            direction: rtl;
        }

        .binance-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #848e9c;
            font-size: 12px;
            flex: 1;
        }

        .binance-nav-item.active {
            color: #f0b90b;
        }

        .binance-nav-item i {
            font-size: 18px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="pkg-container">
        <h2 style="font-family: 'Cairo', sans-serif; color: #f0b90b; margin-bottom: 20px;">الباقات الاستثمارية</h2>
        
        <!-- كروت الباقات الخمسة بأبعاد مضبوطة وموحدة -->
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg1.jpg" alt="الباقة الأولى">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg2.jpg" alt="الباقة الثانية">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg3.jpg" alt="الباقة الثالثة">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg4.jpg" alt="الباقة الرابعة">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg5.jpg" alt="الباقة الخامسة">
        </div>
    </div>

    <!-- نافذة طلب كلمة المرور المنبثقة -->
    <div id="pkgModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center;">
        <div style="background: #182030; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 5px 25px rgba(0,0,0,0.5); border: 1px solid #f0b90b;">
            <h3 style="margin-top: 0; color: #f0b90b; font-family: 'Cairo', sans-serif;">تفعيل الباقة</h3>
            <p style="font-size: 14px; color: #a0a5b5; margin-bottom: 20px;">يرجى إدخال مفتاح التفعيل الخاص بك لتشغيل هذه الباقة الاستثمارية.</p>
            <input type="text" id="pkgPassword" placeholder="أدخل مفتاح التفعيل هنا" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333d52; background: #0b0f19; color: white; text-align: center; font-size: 15px; margin-bottom: 10px; box-sizing: border-box;">
            <div id="pkgError" style="color: #ff4a5a; font-size: 13px; margin-bottom: 15px; display: none;">مفتاح التفعيل غير صحيح!</div>
            <div style="display: flex; gap: 12px;">
                <button onclick="submitPkgActivation()" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: #f0b90b; color: #0b0f19; font-weight: bold; cursor: pointer; font-family: 'Cairo', sans-serif;">تفعيل</button>
                <button onclick="closePackageModal()" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333d52; background: transparent; color: white; cursor: pointer; font-family: 'Cairo', sans-serif;">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- شريط التنقل الكلاسيكي الموحد -->
    <div class="binance-bottom-nav">
        <a href="index.html" class="binance-nav-item">
            <i class="fas fa-user"></i>
            <span>حسابي</span>
        </a>
        <a href="tasks.html" class="binance-nav-item">
            <i class="fas fa-list-ul"></i>
            <span>المهام</span>
        </a>
        <a href="assets.html" class="binance-nav-item active">
            <i class="fas fa-wallet"></i>
            <span>الأصول</span>
        </a>
        <a href="home.html" class="binance-nav-item">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
    </div>

    <script>
        function openPkgModal() {
            document.getElementById('pkgModal').style.display = 'flex';
            document.getElementById('pkgError').style.display = 'none';
            document.getElementById('pkgPassword').value = '';
        }
        function closePackageModal() {
            document.getElementById('pkgModal').style.display = 'none';
        }
        function submitPkgActivation() {
            if(document.getElementById('pkgPassword').value.trim() === ""){
                alert("يرجى إدخال كلمة المرور أولاً!");
                return;
            }
            document.getElementById('pkgError').style.display = 'block';
        }
    </script>
</body>
</html>
