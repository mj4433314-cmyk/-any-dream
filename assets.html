<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الباقات - الأصول</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            padding: 20px;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 90px;
        }

        .pkg-container {
            max-width: 450px;
            margin: auto;
            text-align: center;
        }

        .pkg-card {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            background-color: #111522;
            transition: transform 0.2s ease;
        }

        .pkg-card:active {
            transform: scale(0.97);
        }

        .pkg-card img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* تنسيق شريط التنقل السفلي مع إضافة تأثير النبض الكلاسيكي السريع */
        .binance-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #111522;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #22293f;
            z-index: 9999;
            direction: rtl;
        }

        .binance-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #848e9c;
            font-size: 12px;
            flex: 1;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* تأثير النبضة والارتداد عند الضغط على الأزرار */
        .binance-nav-item:active {
            transform: scale(0.88);
        }

        .binance-nav-item.active {
            color: #f0b90b;
        }

        .binance-nav-item i {
            font-size: 18px;
            margin-bottom: 4px;
        }

        /* تنسيق النافذة المنبثقة للـ CodePen */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        .popup {
            background: #ffffff;
            border-radius: 8px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-family: sans-serif;
            animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .popup-content {
            padding: 30px 20px;
            color: #333333;
        }

        .popup-content .icon {
            width: 55px;
            height: 55px;
            margin: 0 auto 15px auto;
            display: block;
            animation: pulseIcon 1.5s infinite ease-in-out; /* تأثير نبض أيقونة التحذير */
        }

        .popup-content .title {
            display: block;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .popup-content .detail {
            font-size: 15px;
            color: #7f8c8d;
            margin: 0;
            line-height: 1.5;
        }

        .popup-footer {
            background: #F65656;
            color: white;
            padding: 15px 0;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .popup-footer:hover {
            background: #e04b4b;
        }

        /* تأثيرات الحركة (Animations) */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="pkg-container">
        <h2 style="font-family: 'Cairo', sans-serif; color: #f0b90b; margin-bottom: 20px;">الباقات الاستثمارية</h2>
        
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg1.jpg" alt="الباقة الأولى">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg2.jpg" alt="الباقة الثانية">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg3.jpg" alt="الباقة الثالثة">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg4.jpg" alt="الباقة الرابعة">
        </div>
        <div class="pkg-card" onclick="openPkgModal()">
            <img src="pkg5.jpg" alt="الباقة الخامسة">
        </div>
    </div>

    <!-- شاشة النافذة المنبثقة المستوحاة من CodePen مع تأثير النبض للتحذير -->
    <div id="pkgModal" class="modal-overlay">
        <div class="popup">
            <div class="popup-content">
                <span class="icon">
                    <svg fill="#F65656" viewBox="0 0 1024 1024" xmlns="http://w3.org" stroke="#F65656">
                        <path d="M955.7 856l-416-720c-6.2-10.7-16.9-16-27.7-16s-21.6 5.3-27.7 16l-416 720C56 877.4 71.4 904 96 904h832c24.6 0 40-26.6 27.7-48zM480 416c0-4.4 3.6-8 8-8h48c4.4 0 8 3.6 8 8v184c0 4.4-3.6 8-8 8h-48c-4.4 0-8-3.6-8-8V416zm32 352a48.01 48.01 0 0 1 0-96 48.01 48.01 0 0 1 0 96z"></path>
                    </svg>
                </span>
                <span class="title">HRUSDT</span>
                <p class="detail">Please top up your account to activate the package.</p>
            </div>
            <div class="popup-footer" onclick="closePackageModal()">Dismiss</div>
        </div>
    </div>

    <!-- شريط التنقل الكلاسيكي الموحد مع تأثير النبضات السلس وسلسلة الربط الدقيقة -->
    <div class="binance-bottom-nav">
        <a href="index.html" class="binance-nav-item">
            <i class="fas fa-user"></i>
            <span>حسابي</span>
        </a>
        <a href="tasks.html" class="binance-nav-item">
            <i class="fas fa-list-ul"></i>
            <span>المهام</span>
        </a>
        <a href="assets.html" class="binance-nav-item active">
            <i class="fas fa-wallet"></i>
            <span>الأصول</span>
        </a>
        <a href="home.html" class="binance-nav-item">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
    </div>

    <script>
        function openPkgModal() {
            document.getElementById('pkgModal').style.display = 'flex';
        }
        function closePackageModal() {
            document.getElementById('pkgModal').style.display = 'none';
        }
    </script>
</body>
</html>
