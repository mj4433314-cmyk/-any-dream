<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأصول - الباقات</title>
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body style="background-color: #0b0f19; margin: 0; padding-bottom: 80px;">

<div style="max-width: 450px; margin: 0 auto; padding: 20px; text-align: center; color: white;">
  <h2 style="font-family: 'Cairo', sans-serif; margin-bottom: 25px;">باقات الاستثمار المتاحة</h2>
  
  <!-- الباقات الخمسة كمربعات صور قابلة للنقر -->
  <div style="width: 100%; border-radius: 16px; overflow: hidden; cursor: pointer; margin-bottom: 20px;" onclick="openPkgModal()">
    <img src="pkg1.jpg" alt="Baqah 1" style="width: 100%; display: block;">
  </div>
  <div style="width: 100%; border-radius: 16px; overflow: hidden; cursor: pointer; margin-bottom: 20px;" onclick="openPkgModal()">
    <img src="pkg2.png" alt="Baqah 2" style="width: 100%; display: block;">
  </div>
  <div style="width: 100%; border-radius: 16px; overflow: hidden; cursor: pointer; margin-bottom: 20px;" onclick="openPkgModal()">
    <img src="pkg3.png" alt="Baqah 3" style="width: 100%; display: block;">
  </div>
  <div style="width: 100%; border-radius: 16px; overflow: hidden; cursor: pointer; margin-bottom: 20px;" onclick="openPkgModal()">
    <img src="pkg4.png" alt="Baqah 4" style="width: 100%; display: block;">
  </div>
  <div style="width: 100%; border-radius: 16px; overflow: hidden; cursor: pointer; margin-bottom: 20px;" onclick="openPkgModal()">
    <img src="pkg5.png" alt="Baqah 5" style="width: 100%; display: block;">
    
  </div>
</div>

<!-- النافذة المنبثقة لطلب كلمة المرور للاتشاح -->
<div id="pkgModal" class="modal-overlay" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); z-index: 10000; justify-content: center; align-items: center; padding: 20px;">
  <div style="background: #1e293b; border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; text-align: center; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
    <h3 style="margin-top: 0; font-family: 'Cairo', sans-serif;">تأكيد تفعيل الباقة</h3>
    <p style="color: #94a3b8; font-size: 14px;">يرجى كتابة كلمة المرور الخاصة بك لتنشيط الحزمة:</p>
    <input type="password" id="pkgPassword" placeholder="أدخل كلمة مرور الحساب" style="width: 100%; background: #0b0f19; border: 1px solid #334155; border-radius: 10px; padding: 12px; color: white; font-size: 15px; outline: none; box-sizing: border-box; text-align: center; margin-top: 10px;">
    
    <!-- رسالة الرصيد غير متاح الدقيقة -->
    <div id="pkgError" style="display: none; background: #fee2e2; border-right: 4px solid #ef4444; color: #991b1b; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-top: 15px; align-items: center; justify-content: center; gap: 8px;">
      <i class="fas fa-exclamation-circle"></i> عذراً، رصيدك غير متاح لتفعيل الباقة.
    </div>

    <div style="display: flex; gap: 12px; margin-top: 20px;">
      <button onclick="submitPkgActivation()" style="flex: 1; background: #10b981; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer;">تأكيد</button>
      <button onclick="closePackageModal()" style="flex: 1; background: #334155; color: #e2e8f0; border: none; padding: 12px; border-radius: 10px; cursor: pointer;">إلغاء</button>
    </div>
  </div>
</div>

<!-- شريط بايننس السفلي المسطح الموحد (الأصول هو النشط هنا باللون الذهبي) -->
<div class="binance-bottom-nav">
  <a href="account.html" class="binance-nav-item">
    <i class="fas fa-user"></i>
    <span>حسابي</span>
  </a>
  <a href="tasks.html" class="binance-nav-item">
    <i class="fas fa-list-ul"></i>
    <span>المهام</span>
  </a>
  <a href="assets.html" class="binance-nav-item current-active">
    <i class="fas fa-wallet"></i>
    <span>الأصول</span>
  </a>
  <a href="home.html" class="binance-nav-item">
    <i class="fas fa-home"></i>
    <span>الرئيسية</span>
  </a>
</div>

<script>
function openPkgModal() {
  document.getElementById('pkgModal').style.display = 'flex';
  document.getElementById('pkgError').style.display = 'none';
  document.getElementById('pkgPassword').value = '';
}
function closePackageModal() {
  document.getElementById('pkgModal').style.display = 'none';
}
function submitPkgActivation() {
  if(document.getElementById('pkgPassword').value.trim() === "") {
    alert("يرجى إدخال كلمة المرور أولاً.");
    return;
  }
  document.getElementById('pkgError').style.display = 'flex';
}
</script>
</body>
</html>
